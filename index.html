<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Hand-OS Ultra - MacOS Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #000; --panel: rgba(28, 28, 30, 0.95); --text: #fff; }
        body, html { margin: 0; padding: 0; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=2000&q=80') center/cover; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100%; }

        /* CURSEUR STABILISÉ */
        #cursor {
            position: fixed; width: 18px; height: 18px; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; transition: transform 0.1s ease;
        }
        #cursor.pinch { transform: scale(0.6); background: var(--primary); }

        /* DOCK STYLE MACOS */
        .dock-container { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .dock {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(25px);
            padding: 8px; border-radius: 20px; display: flex; align-items: flex-end;
            gap: 12px; border: 0.5px solid rgba(255,255,255,0.3);
        }
        .dock-item {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; transition: all 0.2s cubic-bezier(0.12, 0, 0.39, 0);
        }
        .dock-item.hover { width: 80px; height: 80px; font-size: 50px; margin: 0 10px; }

        /* GESTIONNAIRE DE FENÊTRES */
        .window { 
            position: fixed; top: 80px; left: 80px; right: 80px; bottom: 120px;
            background: var(--panel); border-radius: 18px; display: none;
            flex-direction: column; box-shadow: 0 50px 100px rgba(0,0,0,0.6); z-index: 100;
            border: 0.5px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
        }
        .win-active { display: flex; }
        .win-head { padding: 12px; background: rgba(0,0,0,0.2); display: flex; align-items: center; border-radius: 18px 18px 0 0; }
        .close-dot { width: 12px; height: 12px; background: #ff453a; border-radius: 50%; cursor: pointer; margin-right: 15px; }

        /* APPLICATIONS */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, 100px); gap: 20px; padding: 20px; }
        .file-item { text-align: center; font-size: 12px; cursor: pointer; padding: 10px; border-radius: 8px; }
        .file-item.hover { background: rgba(255,255,255,0.1); }
        
        #editor { width: 100%; height: 100%; border: none; padding: 40px; box-sizing: border-box; background: white; color: black; font-size: 18px; outline: none; resize: none; }
        
        #v-prev { position: fixed; top: 10px; right: 10px; width: 100px; border-radius: 10px; transform: scaleX(-1); opacity: 0.7; }
    </style>
</head>
<body>

<div id="cursor"></div>
<video id="v-prev" autoplay playsinline></video>

<div class="dock-container">
    <div class="dock">
        <div class="dock-item" data-app="files" title="Finder">📂</div>
        <div class="dock-item" data-app="writer" title="LibreOffice Writer">📝</div>
        <div class="dock-item" data-app="paint" title="Photos/Dessin">🎨</div>
        <div class="dock-item" data-app="web" title="Safari">🌐</div>
    </div>
</div>

<div id="win" class="window">
    <div class="win-head">
        <div class="close-dot" onclick="closeApp()"></div>
        <span id="win-title" style="font-weight:600; font-size:14px; opacity:0.8;">Application</span>
    </div>
    <div id="win-body" style="flex-grow:1; overflow:auto;"></div>
</div>

<script>
    const cursor = document.getElementById('cursor');
    const win = document.getElementById('win');
    const winBody = document.getElementById('win-body');
    let cX = 0, cY = 0, isMirror = true;

    // --- BASE DE DONNÉES DE L'OS ---
    const FilesSystem = [
        { name: "Curriculum.odt", type: "writer", icon: "📄" },
        { name: "Vacances.jpg", type: "paint", icon: "🖼️" },
        { name: "Budget.ods", type: "writer", icon: "📊" }
    ];

    const Apps = {
        writer: {
            title: "LibreOffice Writer",
            render: () => `<textarea id="editor" placeholder="Commencez à rédiger votre document..."></textarea>`
        },
        files: {
            title: "Finder - Mes Fichiers",
            render: () => `
                <div class="file-grid">
                    ${FilesSystem.map(f => `<div class="file-item" onclick="openApp('${f.type}')">
                        <div style="font-size:40px">${f.icon}</div>
                        <div>${f.name}</div>
                    </div>`).join('')}
                </div>`
        },
        paint: {
            title: "Dessin",
            render: () => `<canvas id="pc" style="background:white;width:100%;height:100%"></canvas>`
        },
        web: {
            title: "Safari",
            render: () => `<iframe src="https://www.wikipedia.org" style="width:100%;height:100%;border:none;background:white;"></iframe>`
        }
    };

    // --- TRACKING MAINS (MEDIAPIPE) ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

    

    hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const idx = res.multiHandLandmarks[0][8];
            const thm = res.multiHandLandmarks[0][4];

            // Positionnement & Lissage
            let tx = (isMirror ? 1 - idx.x : idx.x) * window.innerWidth;
            let ty = idx.y * window.innerHeight;
            cX += (tx - cX) * 0.25; cY += (ty - cY) * 0.25;

            cursor.style.left = cX + 'px'; cursor.style.top = cY + 'px';

            const dist = Math.hypot(idx.x - thm.x, idx.y - thm.y);
            if (dist < 0.045) {
                if (!cursor.classList.contains('pinch')) {
                    cursor.classList.add('pinch');
                    const target = document.elementFromPoint(cX, cY);
                    if (target) target.click();
                }
            } else {
                cursor.classList.remove('pinch');
                updateHover(cX, cY);
            }
        }
    });

    // --- LOGIQUE OS ---
    function openApp(id) {
        document.getElementById('win-title').innerText = Apps[id].title;
        winBody.innerHTML = Apps[id].render();
        win.classList.add('win-active');
    }

    function closeApp() { win.classList.remove('win-active'); }

    function updateHover(x, y) {
        document.querySelectorAll('.dock-item, .file-item, .close-dot').forEach(el => {
            const r = el.getBoundingClientRect();
            if (x > r.left && x < r.right && y > r.top && y < r.bottom) el.classList.add('hover');
            else el.classList.remove('hover');
        });
    }

    document.querySelectorAll('.dock-item').forEach(i => i.onclick = () => openApp(i.dataset.app));

    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        document.getElementById('v-prev').srcObject = stream;
        new Camera(document.getElementById('v-prev'), {onFrame: async () => { await hands.send({image:document.getElementById('v-prev')}); }}).start();
    }
    start();
</script>
</body>
</html>
