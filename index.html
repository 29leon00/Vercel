<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CHAOS VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000">
      
      <a-entity id="world" position="0 0 0">
        <a-box position="0 0 -10" scale="20 20 0.1" material="wireframe: true; color: #0f0"></a-box>
        <a-box position="0 0 10" scale="20 20 0.1" material="wireframe: true; color: #0f0"></a-box>
        <a-box position="-10 0 0" rotation="0 90 0" scale="20 20 0.1" material="wireframe: true; color: #f0f"></a-box>
        <a-box position="10 0 0" rotation="0 90 0" scale="20 20 0.1" material="wireframe: true; color: #f0f"></a-box>
        <a-box position="0 -10 0" rotation="90 0 0" scale="20 20 0.1" material="wireframe: true; color: #ff0"></a-box>
        <a-box position="0 10 0" rotation="90 0 0" scale="20 20 0.1" material="wireframe: true; color: #ff0"></a-box>

        <a-entity id="particles"></a-entity>
      </a-entity>

      <a-entity camera look-controls position="0 0 0"></a-entity>

    </a-scene>

    <script>
      const world = document.querySelector('#world');
      const particles = document.querySelector('#particles');

      // Générer des débris
      for (let i = 0; i < 100; i++) {
        let s = document.createElement('a-sphere');
        s.setAttribute('radius', Math.random() * 0.5);
        s.setAttribute('position', `${(Math.random()-0.5)*15} ${(Math.random()-0.5)*15} ${(Math.random()-0.5)*15}`);
        s.setAttribute('color', Math.random() > 0.5 ? '#ff0000' : '#ffffff');
        particles.appendChild(s);
      }

      // Boucle de rotation chaotique
      let rx = 0, ry = 0, rz = 0;
      function step() {
        // Changement de rotation imprévisible
        rx += Math.random() * 2;
        ry += Math.random() * 2;
        rz += Math.random() * 0.5;
        
        world.setAttribute('rotation', `${rx} ${ry} ${rz}`);
        
        // Effet de zoom avant/arrière bizarre
        let s = 1 + Math.sin(Date.now() * 0.005) * 0.2;
        world.setAttribute('scale', `${s} ${s} ${s}`);
        
        requestAnimationFrame(step);
      }
      step();
    </script>
  </body>
</html>
