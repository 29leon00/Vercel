<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Hand-OS Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --bg: #1a1a1a; --accent: #007AFF; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* WALLPAPER DYNAMIQUE */
        #desktop { width: 100%; height: 100%; background: linear-gradient(45deg, #1e3a8a, #581c87); position: relative; }

        /* LAUNCHPAD (TRIÉ PAR CATÉGORIES) */
        #launchpad { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(30px);
            display: none; padding: 50px; z-index: 2000; grid-template-columns: 1fr; gap: 40px;
            overflow-y: auto;
        }
        .category-section { border-bottom: 1px solid rgba(255,255,255,0.1); pb-5; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; padding: 20px 0; }
        .app-item { text-align: center; cursor: pointer; padding: 15px; border-radius: 20px; transition: 0.3s; }
        .app-item:hover, .app-item.active { background: var(--glass); transform: scale(1.1); }
        .app-icon { font-size: 50px; margin-bottom: 10px; }

        /* FENÊTRES AMÉLIORÉES */
        .window { 
            position: absolute; width: 80%; height: 75%; background: #262626; border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: none; flex-direction: column;
            border: 1px solid #404040; overflow: hidden;
        }
        .win-bar { background: #171717; padding: 12px; display: flex; align-items: center; cursor: move; }
        .win-ctrl { width: 12px; height: 12px; border-radius: 50%; background: #ff5f57; margin-right: 10px; }
        .win-body { flex: 1; padding: 0; position: relative; }

        /* DOCK PROFESSIONNEL */
        #dock { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 20px; display: flex; gap: 15px; z-index: 3000;
        }
        .dock-btn { font-size: 30px; cursor: pointer; transition: 0.2s; padding: 5px; }
        .dock-btn:hover { transform: translateY(-10px); }

        /* CURSEUR IA */
        #cursor { position: fixed; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
        #v-stream { position: fixed; top: 10px; right: 10px; width: 120px; border-radius: 12px; transform: scaleX(-1); border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="desktop">
    <div id="cursor"></div>
    <video id="v-stream" autoplay playsinline></video>

    <div id="dock">
        <div class="dock-btn" onclick="toggleLaunchpad()">🚀</div>
        <div class="dock-btn" onclick="openApp('finder')">📂</div>
    </div>

    <div id="launchpad">
        <div class="category-section">
            <h2>🏠 Système</h2>
            <div class="app-grid" id="cat-sys"></div>
        </div>
        <div class="category-section">
            <h2>✍️ Productivité</h2>
            <div class="app-grid" id="cat-prod"></div>
        </div>
        <div class="category-section">
            <h2>🎨 Créativité</h2>
            <div class="app-grid" id="cat-crea"></div>
        </div>
    </div>

    <div id="main-window" class="window">
        <div class="win-bar"><div class="win-ctrl" onclick="closeApp()"></div><span id="win-title">App</span></div>
        <div id="win-body" class="win-body"></div>
    </div>
</div>

<script>
    // --- BASE DE DONNÉES DES APPS ---
    const APPS = [
        { id: 'finder', name: 'Finder', icon: '📂', cat: 'sys', content: '<h3>Fichiers récents</h3><div id="file-list"></div>' },
        { id: 'settings', name: 'Réglages', icon: '⚙️', cat: 'sys', content: '<button onclick="location.reload()">Redémarrer</button>' },
        { id: 'writer', name: 'Writer', icon: '📝', cat: 'prod', content: '<textarea id="txt-ed" style="width:100%;height:100%;border:none;padding:20px;font-size:18px;"></textarea>' },
        { id: 'calc', name: 'Calcul', icon: '🔢', cat: 'prod', content: '<div style="font-size:40px;padding:20px;">0</div>' },
        { id: 'paint', name: 'PhotoPaint', icon: '🎨', cat: 'crea', content: '<canvas id="pc" style="background:white;width:100%;height:100%"></canvas>' },
        { id: 'music', name: 'Studio', icon: '🎹', cat: 'crea', content: '<h3>Séquenceur Audio</h3>' },
        { id: 'browser', name: 'Web', icon: '🌐', cat: 'prod', content: '<iframe src="https://www.bing.com" style="width:100%;height:100%;border:none;"></iframe>' }
    ];

    // --- LOGIQUE INTERFACE ---
    function initLaunchpad() {
        APPS.forEach(app => {
            const el = `<div class="app-item" onclick="openApp('${app.id}')"><div class="app-icon">${app.icon}</div><div>${app.name}</div></div>`;
            document.getElementById('cat-' + app.cat).innerHTML += el;
        });
    }

    function toggleLaunchpad() {
        const lp = document.getElementById('launchpad');
        lp.style.display = (lp.style.display === 'grid') ? 'none' : 'grid';
    }

    function openApp(id) {
        const app = APPS.find(a => a.id === id);
        document.getElementById('win-title').innerText = app.name;
        document.getElementById('win-body').innerHTML = app.content;
        document.getElementById('main-window').style.display = 'flex';
        document.getElementById('launchpad').style.display = 'none';
    }

    function closeApp() { document.getElementById('main-window').style.display = 'none'; }

    // --- TRACKING STABILISÉ (MEDIA PIPE) ---
    const cursor = document.getElementById('cursor');
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

    let cX = 0, cY = 0;
    hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const lm = res.multiHandLandmarks[0];
            const idx = lm[8], thm = lm[4];
            
            let tx = (1 - idx.x) * window.innerWidth;
            let ty = idx.y * window.innerHeight;
            cX += (tx - cX) * 0.3; cY += (ty - cY) * 0.3;

            cursor.style.left = cX + 'px'; cursor.style.top = cY + 'px';

            const dist = Math.hypot(idx.x - thm.x, idx.y - thm.y);
            if (dist < 0.05) {
                const target = document.elementFromPoint(cX, cY);
                if(target) target.click();
            }
        }
    });

    async function start() {
        initLaunchpad();
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        document.getElementById('v-stream').srcObject = stream;
        new Camera(document.getElementById('v-stream'), {
            onFrame: async () => { await hands.send({image: document.getElementById('v-stream')}); }
        }).start();
    }
    start();
</script>
</body>
</html>
