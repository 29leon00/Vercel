<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; }
        #input_video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
    </style>
</head>
<body>
    <video id="input_video" autoplay playsinline></video>

    <a-scene>
        <a-sphere id="cursor" radius="0.05" color="red"></a-sphere>
        <a-box id="box" position="0 1.5 -2" color="blue"></a-box>
        <a-sky opacity="0"></a-sky>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const cursor = document.getElementById('cursor');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5});

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8]; // Index
                const x = (0.5 - landmark.x) * 3;
                const y = (0.5 - landmark.y) * 3 + 1.5;
                cursor.setAttribute('position', `${x} ${y} -1.5`);
                cursor.setAttribute('visible', 'true');
            } else {
                cursor.setAttribute('visible', 'false');
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
