<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu MediaPipe Hands - Capture</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Vidéo masquée mais active pour la détection */
        #input_video {
            display: none;
        }

        /* Canvas plein écran avec effet miroir */
        #output_canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .stat {
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat" id="score">Score: 0</div>
    </div>

    <div id="instructions">Déplacez votre index pour toucher les cibles rouges !</div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let target = { x: 0, y: 0, radius: 40 };
        let indexPos = { x: 0, y: 0 };
        
        // Initialisation de la cible
        function resetTarget() {
            target.x = Math.random() * (window.innerWidth - 100) + 50;
            target.y = Math.random() * (window.innerHeight - 100) + 50;
        }
        resetTarget();

        // Redimensionnement dynamique du canvas
        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function onResults(results) {
            // 1. Nettoyer le canvas
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 2. Dessiner la cible
            canvasCtx.beginPath();
            canvasCtx.arc(target.x, target.y, target.radius, 0, 2 * Math.PI);
            canvasCtx.fillStyle = '#ff4757';
            canvasCtx.shadowBlur = 20;
            canvasCtx.shadowColor = '#ff4757';
            canvasCtx.fill();
            canvasCtx.closePath();

            // 3. Analyse des mains
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    
                    // On récupère l'index (Point 8)
                    // (1 - x) pour l'effet miroir
                    indexPos.x = (1 - landmarks[8].x) * canvasElement.width;
                    indexPos.y = landmarks[8].y * canvasElement.height;

                    // Dessiner le pointeur de l'index
                    canvasCtx.beginPath();
                    canvasCtx.arc(indexPos.x, indexPos.y, 15, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#2ed573';
                    canvasCtx.shadowBlur = 15;
                    canvasCtx.shadowColor = '#2ed573';
                    canvasCtx.fill();
                    canvasCtx.closePath();

                    // Vérifier la collision
                    const dist = Math.hypot(indexPos.x - target.x, indexPos.y - target.y);
                    if (dist < target.radius + 15) {
                        score += 10;
                        scoreElement.innerText = `Score: ${score}`;
                        resetTarget();
                    }

                    // Optionnel : Dessiner le squelette de la main pour débugger
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff33', lineWidth: 2});
                }
            }
            canvasCtx.restore();
        }

        // Configuration de MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Lancement de la caméra
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

    </script>
</body>
</html>
