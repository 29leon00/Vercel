<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Ultimate Lab</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <audio id="beep" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
        </a-assets>

        <a-entity environment="preset: yavapai; lighting: none; shadow: true; dressingAmount: 0"></a-entity>
        <a-light type="ambient" color="#fff"></a-light>
        <a-light type="directional" position="1 4 3" intensity="0.6" castShadow="true"></a-light>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera look-controls position="0 1.6 0" shake-detector>
                <a-entity cursor="fuse: true; fuseTimeout: 1000"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                          material="color: #6200EE; shader: flat">
                </a-entity>
                <a-text id="status" value="Regardez un objet" position="0 -0.5 -1.2" align="center" width="2" color="#333"></a-text>
            </a-entity>
        </a-entity>

        <a-entity position="-2 1 -4">
            <a-box class="interact" color="#03DAC6" 
                   animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
                   hover-info="msg: Objet Interactif - Change la couleur">
            </a-box>
        </a-entity>

        <a-entity position="2 1 -4">
            <a-sphere class="interact" color="#BB86FC" radius="0.7"
                      sound="src: #beep; on: click"
                      hover-info="msg: Audio Spatial - Cliquez pour le son">
                <a-light type="point" intensity="0.5" color="#BB86FC"></a-light>
            </a-sphere>
        </a-entity>

        <a-entity position="0 0 -8" particle-system="color: #6200EE; particleCount: 500; size: 0.1"></a-entity>

        <a-plane rotation="-90 0 0" width="20" height="20" color="#F5F5F5" shadow="receive: true"></a-plane>
    </a-scene>

    <script>
        // COMPOSANT : Détection des secousses (Accéléromètre)
        AFRAME.registerComponent('shake-detector', {
            init: function () {
                this.lastUpdate = 0;
                this.lastX = null;
                window.addEventListener('devicemotion', (ev) => {
                    let acc = ev.accelerationIncludingGravity;
                    if (this.lastX !== null) {
                        let delta = Math.abs(acc.x - this.lastX);
                        if (delta > 20) { // Si on secoue le tel
                            document.querySelector('a-scene').setAttribute('background', 'color', '#000');
                            setTimeout(() => document.querySelector('a-scene').setAttribute('background', 'color', '#fff'), 100);
                        }
                    }
                    this.lastX = acc.x;
                });
            }
        });

        // COMPOSANT : Mise à jour du texte d'info
        AFRAME.registerComponent('hover-info', {
            schema: { msg: {type: 'string'} },
            init: function () {
                let status = document.querySelector('#status');
                this.el.addEventListener('mouseenter', () => {
                    status.setAttribute('value', this.data.msg);
                    this.el.setAttribute('scale', '1.2 1.2 1.2');
                    if(navigator.vibrate) navigator.vibrate(50); // Vibration
                });
                this.el.addEventListener('mouseleave', () => {
                    status.setAttribute('value', 'Regardez un objet');
                    this.el.setAttribute('scale', '1 1 1');
                });
                this.el.addEventListener('click', () => {
                    // Change la couleur aléatoirement
                    this.el.setAttribute('color', '#' + Math.floor(Math.random()*16777215).toString(16));
                });
            }
        });

        // IMPORTANT : Forcer l'activation des capteurs sur iOS/Chrome
        document.body.addEventListener('click', function() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission();
            }
        }, {once: true});
    </script>
</body>
</html>
