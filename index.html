<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Material Hand-OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bb86fc;
            --bg: #121212;
            --surface: #1e1e1e;
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Roboto', sans-serif; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }

        /* Curseur de précision */
        #cursor {
            position: fixed; width: 20px; height: 20px;
            border: 3px solid var(--primary); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px var(--primary);
            transition: transform 0.1s ease;
        }
        #cursor.active { background: var(--primary); transform: scale(0.7); }

        /* Barre d'état */
        .status-bar {
            padding: 20px 40px; display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }

        /* Conteneur d'applications */
        .app-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            gap: 30px; padding: 50px;
        }

        .card {
            background: var(--surface); width: 220px; height: 280px;
            border-radius: 24px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card.hover { transform: translateY(-15px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(187, 134, 252, 0.2); }
        .card i { font-size: 50px; margin-bottom: 20px; }

        /* Fenêtre Application */
        #app-window {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 75%;
            background: var(--surface); border-radius: 24px; display: none;
            flex-direction: column; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .back-btn { padding: 10px 20px; background: #333; border-radius: 10px; align-self: flex-start; }

        #video_input { display: none; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="status-bar">
        <div id="clock">12:00</div>
        <div id="gesture-status">Recherche de la main...</div>
    </div>

    <div class="app-container" id="home-screen">
        <div class="card" id="app-music" onclick="openApp('Musique', '🎵 Lecture : Lo-Fi Summer Chill')">
            <i>🎵</i>
            <h3>Musique</h3>
        </div>
        <div class="card" id="app-web" onclick="openApp('Navigateur', '🌐 wikipedia.org chargé')">
            <i>🌐</i>
            <h3>Web</h3>
        </div>
        <div class="card" id="app-settings" onclick="openApp('Réglages', '⚙️ Volume : 80% | WiFi : Connecté')">
            <i>⚙️</i>
            <h3>Réglages</h3>
        </div>
    </div>

    <div id="app-window">
        <div class="back-btn" id="close-btn">← RETOUR</div>
        <h1 id="window-title" style="color: var(--primary);">Titre</h1>
        <div id="window-content" style="font-size: 1.2em; margin-top: 20px;">Contenu</div>
    </div>

    <video id="video_input" autoplay playsinline></video>

    <script>
        const cursor = document.getElementById('cursor');
        const cards = document.querySelectorAll('.card');
        const appWindow = document.getElementById('app-window');
        
        let isMirror = true;
        let curX = 0, curY = 0;
        let tgtX = 0, tgtY = 0;
        const lerp = 0.15; // Puissance du lissage (0.1 = très stable)
        let canClick = true;

        // --- 1. CONFIGURATION IA ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('gesture-status').innerText = "Main détectée ✅";
                const landmark = results.multiHandLandmarks[0][8]; // Index tip
                const thumb = results.multiHandLandmarks[0][4]; // Thumb tip

                // Conversion coordonnées IA vers écran
                let rawX = isMirror ? (1 - landmark.x) : landmark.x;
                tgtX = rawX * window.innerWidth;
                tgtY = landmark.y * window.innerHeight;

                // Lissage exponentiel (Lerp) pour la stabilité
                curX += (tgtX - curX) * lerp;
                curY += (tgtY - curY) * lerp;

                cursor.style.left = curX + 'px';
                cursor.style.top = curY + 'px';

                // Détection du Pincement (Distance Index-Pouce)
                const dist = Math.hypot(landmark.x - thumb.x, landmark.y - thumb.y);
                if (dist < 0.05) {
                    cursor.classList.add('active');
                    handleInteraction(curX, curY);
                } else {
                    cursor.classList.remove('active');
                    canClick = true;
                    handleHover(curX, curY);
                }
            } else {
                document.getElementById('gesture-status').innerText = "Main perdue ❌";
            }
        });

        // --- 2. LOGIQUE D'INTERACTION ---
        function handleHover(x, y) {
            const elements = [ ...cards, document.getElementById('close-btn') ];
            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    el.classList.add('hover');
                    if (el.style) el.style.background = "#2c2c2c";
                } else {
                    el.classList.remove('hover');
                    if (el.style && el.id !== 'close-btn') el.style.background = "";
                }
            });
        }

        function handleInteraction(x, y) {
            if (!canClick) return;
            const target = document.elementFromPoint(x, y);
            const clickable = target ? target.closest('.card, .back-btn') : null;
            
            if (clickable) {
                clickable.click();
                canClick = false; // Bloque le clic jusqu'au relâchement
            }
        }

        // --- 3. FONCTIONS DES APPS ---
        function openApp(title, content) {
            document.getElementById('window-title').innerText = title;
            document.getElementById('window-content').innerText = content;
            appWindow.style.display = 'flex';
            document.getElementById('home-screen').style.opacity = '0.2';
        }

        document.getElementById('close-btn').onclick = () => {
            appWindow.style.display = 'none';
            document.getElementById('home-screen').style.opacity = '1';
        };

        // --- 4. INITIALISATION ---
        async function start() {
            const stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "environment" }});
            const settings = stream.getVideoTracks()[0].getSettings();
            isMirror = (settings.facingMode === 'user' || !settings.facingMode);
            
            const videoElement = document.getElementById('video_input');
            videoElement.srcObject = stream;
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
            
            // Horloge
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }, 1000);
        }

        start();
    </script>
</body>
</html>
