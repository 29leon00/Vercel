<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Multi-Jeux MediaPipe Hands</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        #output_canvas { width: 100vw; height: 100vh; display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
        .menu { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: #444; color: white; font-weight: bold; }
        button:hover { background: #666; }
        button.active { background: #2ed573; }
        #score { font-size: 2em; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <div id="ui"><div id="score">Score: 0</div></div>
    
    <div class="menu">
        <button onclick="setGame('pop')" id="btn-pop" class="active">Pop It!</button>
        <button onclick="setGame('clean')" id="btn-clean">Nettoyage</button>
        <button onclick="setGame('balance')" id="btn-balance">Équilibre</button>
    </div>

    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('score');

        let currentGame = 'pop';
        let score = 0;
        let particles = [];
        let gameItems = []; // Cibles ou saletés
        let balanceX = 0;

        function setGame(mode) {
            currentGame = mode;
            score = 0;
            gameItems = [];
            scoreElement.innerText = `Score: 0`;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            if(mode === 'clean') initCleanGame();
        }

        function initCleanGame() {
            for(let i=0; i<50; i++) {
                gameItems.push({x: Math.random()*canvasElement.width, y: Math.random()*canvasElement.height, size: 40});
            }
        }

        function spawnPop() {
            if(gameItems.length < 5 && Math.random() < 0.05) {
                gameItems.push({
                    x: Math.random() * canvasElement.width,
                    y: canvasElement.height + 50,
                    speed: 2 + Math.random() * 3,
                    radius: 30 + Math.random() * 20,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }
        }

        function onResults(results) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Dessiner un fond léger pour la vidéo
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.translate(canvasElement.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            ctx.restore();

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const index = { x: (1 - hand[8].x) * canvasElement.width, y: hand[8].y * canvasElement.height };
                const palm = { x: (1 - hand[9].x) * canvasElement.width, y: hand[9].y * canvasElement.height };

                if (currentGame === 'pop') {
                    spawnPop();
                    gameItems.forEach((item, indexArr) => {
                        item.y -= item.speed;
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                        ctx.fillStyle = item.color;
                        ctx.fill();

                        let d = Math.hypot(index.x - item.x, index.y - item.y);
                        if (d < item.radius) {
                            gameItems.splice(indexArr, 1);
                            score += 1;
                            scoreElement.innerText = `Score: ${score}`;
                        }
                    });
                } 
                else if (currentGame === 'clean') {
                    ctx.fillStyle = "rgba(255,255,255,0.8)";
                    gameItems.forEach((item, indexArr) => {
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                        ctx.fill();
                        let d = Math.hypot(palm.x - item.x, palm.y - item.y);
                        if (d < 60) {
                            gameItems.splice(indexArr, 1);
                            score++;
                            scoreElement.innerText = `Nettoyé: ${Math.floor((score/50)*100)}%`;
                        }
                    });
                    if(gameItems.length === 0) initCleanGame();
                }
                else if (currentGame === 'balance') {
                    let barWidth = 100;
                    ctx.fillStyle = "#ffde59";
                    ctx.fillRect(index.x - barWidth/2, index.y - 10, barWidth, 10);
                    score++;
                    scoreElement.innerText = `Temps: ${Math.floor(score/10)}s`;
                }

                // Curseur de la main
                ctx.beginPath();
                ctx.arc(index.x, index.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
