<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vision Pro Web VR - Cardboard</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .vr-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: white;
            font-family: sans-serif;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="vr-overlay">Regardez une icône pour l'activer</div>

    <a-scene xr-mode-ui="enabled: true">
        <a-assets>
            <img id="sky" src="https://cdn.aframe.io/a-painter/images/sky.jpg">
        </a-assets>

        <a-sky color="#1a1a1a"></a-sky>
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="1 2 1"></a-light>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor 
                id="cursor"
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                event-set__mouseenter="_event: mouseenter; color: #007AFF"
                event-set__mouseleave="_event: mouseleave; color: black"
                raycaster="objects: .clickable">
            </a-cursor>
        </a-entity>

        <a-entity id="menu" position="0 1.5 -3">
            
            <a-sphere class="clickable" position="-1.2 0 0" radius="0.4" color="#FFFFFF" 
                      animation="property: position; to: -1.2 0.1 0; dir: alternate; dur: 2000; loop: true">
                <a-text value="Safari" align="center" position="0 -0.6 0" scale="0.5 0.5 0.5"></a-text>
            </a-sphere>

            <a-sphere class="clickable" position="0 0 0" radius="0.4" color="#FFD700"
                      animation="property: position; to: 0 0.15 0; dir: alternate; dur: 2500; loop: true">
                <a-text value="Photos" align="center" position="0 -0.6 0" scale="0.5 0.5 0.5"></a-text>
            </a-sphere>

            <a-sphere class="clickable" position="1.2 0 0" radius="0.4" color="#4CD964"
                      animation="property: position; to: 1.2 0.05 0; dir: alternate; dur: 1800; loop: true">
                <a-text value="Messages" align="center" position="0 -0.6 0" scale="0.5 0.5 0.5"></a-text>
            </a-sphere>

        </a-entity>

        <a-grid static-body material="opacity: 0.1; transparent: true"></a-grid>

    </a-scene>

    <script>
        // Logique pour simuler l'ouverture d'une app
        const icons = document.querySelectorAll('.clickable');
        icons.forEach(icon => {
            icon.addEventListener('click', function () {
                this.setAttribute('material', 'color', '#007AFF');
                alert("Ouverture de l'application...");
                setTimeout(() => {
                    this.setAttribute('material', 'color', this.getAttribute('color'));
                }, 1000);
            });
        });
    </script>
</body>
</html>
