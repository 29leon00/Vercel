<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>THE VOID</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="background-color: black;">
    <a-scene fog="type: exponential; color: #050505; density: 0.5">
      
      <a-assets>
        <audio id="glitch" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
      </a-assets>

      <a-sky color="#000"></a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor visible="false"></a-cursor>
      </a-entity>

      <a-entity id="stalker" position="0 1.6 -5" scale="1 2 1" visible="false">
        <a-cone color="#fff" radius-bottom="0.5" radius-top="0" height="2"></a-cone>
        <a-light type="point" color="red" intensity="0.5" distance="2"></a-light>
      </a-entity>

      <a-grid static-body material="color: #111; opacity: 0.2"></a-grid>

    </a-scene>

    <script>
      const stalker = document.querySelector('#stalker');
      const camera = document.querySelector('[camera]');
      let isLooking = false;

      function moveStalker() {
        // L'entité se téléporte derrière toi ou sur les côtés
        const angle = Math.random() * Math.PI * 2;
        const dist = 4 + Math.random() * 3;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;
        
        stalker.setAttribute('position', `${x} 1.2 ${z}`);
        stalker.setAttribute('visible', 'true');
        
        // Elle te regarde toujours
        stalker.setAttribute('look-at', '[camera]');
      }

      // Boucle de "traque"
      setInterval(() => {
        if (!isLooking) {
            moveStalker();
        }
      }, 3000);

      stalker.addEventListener('mouseenter', () => {
        isLooking = true;
        // Si tu la regardes, elle tremble et disparaît
        stalker.setAttribute('animation', 'property: scale; to: 1.5 0 1.5; dur: 100');
        setTimeout(() => {
            stalker.setAttribute('visible', 'false');
            stalker.setAttribute('scale', '1 2 1');
            isLooking = false;
        }, 200);
      });
    </script>
  </body>
</html>
