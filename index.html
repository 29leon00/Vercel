<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial UI - Hand Tracking</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #input_video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; 
        }
        .overlay {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; background: rgba(0,0,0,0.6);
            padding: 10px; border-radius: 8px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <b>Interface Spatiale</b><br>
        • Pincez pour attraper les objets<br>
        • Déplacez-vous pour explorer
    </div>
    
    <video id="input_video" autoplay playsinline></video>

    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor">
        <a-assets>
            <a-mixin id="widget" geometry="primitive: sphere; radius: 0.1" material="color: #FF3366; emissive: #FF3366; emissiveIntensity: 0.5"></a-mixin>
        </a-assets>

        <a-entity id="hand-cursor">
            <a-sphere radius="0.03" color="#00FF00"></a-sphere>
        </a-entity>

        <a-entity id="ui-container">
            <a-box class="interactable" position="-0.5 1.5 -1.5" color="#4CC3D9" depth="0.2" height="0.2" width="0.2"></a-box>
            <a-entity class="interactable" mixin="widget" position="0.5 1.2 -1.2"></a-entity>
            <a-entity class="interactable" mixin="widget" position="0 1.8 -2"></a-entity>
            
            <a-plane position="0 1.5 -2.5" width="2" height="1" color="#222" opacity="0.8">
                <a-text value="MENU SPATIAL" align="center" position="0 0 0.01" width="4"></a-text>
            </a-plane>
        </a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-camera id="main-cam" look-controls wasd-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const cursor = document.getElementById('hand-cursor');
        const interactables = document.querySelectorAll('.interactable');
        
        let grabbedObject = null;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const index = hand[8];
                const thumb = hand[4];

                // Position 3D basée sur la caméra
                const cam = document.querySelector('[camera]').object3D;
                const x = (index.x - 0.5) * 2.5;
                const y = -(index.y - 0.5) * 2 + 1.5;
                const z = -1.5;

                // On positionne le curseur vert
                cursor.setAttribute('position', `${x + cam.position.x} ${y + cam.position.y} ${cam.position.z + z}`);
                cursor.setAttribute('visible', 'true');

                // Logique du Pincement
                const distance = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                
                if (distance < 0.05) {
                    if (!grabbedObject) {
                        // Chercher l'objet le plus proche du curseur
                        interactables.forEach(obj => {
                            const objPos = obj.getAttribute('position');
                            const curPos = cursor.getAttribute('position');
                            const d = Math.hypot(objPos.x - curPos.x, objPos.y - curPos.y);
                            if (d < 0.3) grabbedObject = obj;
                        });
                    }
                    
                    if (grabbedObject) {
                        grabbedObject.setAttribute('position', cursor.getAttribute('position'));
                        grabbedObject.setAttribute('material', 'color', '#FFFF00');
                    }
                } else {
                    if (grabbedObject) {
                        grabbedObject.setAttribute('material', 'color', grabbedObject.tagName === 'A-BOX' ? '#4CC3D9' : '#FF3366');
                        grabbedObject = null;
                    }
                }
            } else {
                cursor.setAttribute('visible', 'false');
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            facingMode: "environment", width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
