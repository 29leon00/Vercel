<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Interface - Hand Control</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene background="color: #111" vr-mode-ui="enabled: true">
        <a-assets>
            <a-mixin id="button-style" geometry="primitive: plane; width: 0.5; height: 0.2" material="color: #333"></a-mixin>
        </a-assets>

        <a-grid position="0 0 0" material="opacity: 0.2; transparent: true"></a-grid>
        
        <a-entity id="menu" position="0 1.5 -1">
            <a-plane width="1.2" height="0.8" material="color: #222; opacity: 0.9">
                <a-text value="CONTROLE VR" align="center" position="0 0.3 0.01" width="3"></a-text>
                
                <a-entity id="btn-1" mixin="button-style" position="0 0.05 0.02" class="clickable">
                    <a-text value="BOUTON A" align="center" width="2"></a-text>
                </a-entity>
                
                <a-entity id="btn-2" mixin="button-style" position="0 -0.2 0.02" class="clickable">
                    <a-text value="BOUTON B" align="center" width="2"></a-text>
                </a-entity>
            </a-plane>
        </a-entity>

        <a-sphere id="hand-cursor" radius="0.02" color="#00FF00" visible="false"></a-sphere>

        <a-entity id="rig" position="0 0 0">
            <a-camera look-controls wasd-controls-enabled="false"></a-camera>
        </a-entity>
    </a-scene>

    <video id="input_video" style="display:none;"></video>

    <script>
        const videoElement = document.getElementById('input_video');
        const cursor = document.getElementById('hand-cursor');
        const buttons = document.querySelectorAll('.clickable');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                const thumbTip = hand[4];

                // --- Correction de la hauteur (y) et de l'alignement ---
                // On centre les coordonnées (x-0.5) et on ajuste y pour qu'il soit plus bas
                const x = (indexTip.x - 0.5) * 2; 
                const y = -(indexTip.y - 0.5) * 1.5 + 1.3; // +1.3 au lieu de 1.5 pour baisser le curseur
                const z = -0.8; // Distance devant les yeux

                cursor.setAttribute('position', `${x} ${y} ${z}`);
                cursor.setAttribute('visible', 'true');

                // Détection du pincement (click virtuel)
                const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                
                if (distance < 0.05) {
                    cursor.setAttribute('color', '#FF0000'); // Rouge quand on clique
                    
                    // Interaction avec les boutons
                    buttons.forEach(btn => {
                        const btnPos = btn.parentElement.getAttribute('position'); // Menu pos
                        const localBtnPos = btn.getAttribute('position'); // Offset pos
                        const worldX = btnPos.x + localBtnPos.x;
                        const worldY = btnPos.y + localBtnPos.y;

                        // Si le doigt est proche du bouton
                        if (Math.abs(x - worldX) < 0.2 && Math.abs(y - worldY) < 0.1) {
                            btn.setAttribute('material', 'color', '#00AAFF');
                            // Action ici (ex: console.log)
                        }
                    });
                } else {
                    cursor.setAttribute('color', '#00FF00');
                    buttons.forEach(btn => btn.setAttribute('material', 'color', '#333'));
                }
            } else {
                cursor.setAttribute('visible', 'false');
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            facingMode: "environment", width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
