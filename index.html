<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Multi-Jeux MediaPipe Hands</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; }
        canvas { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #menu { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 10px; }
        button { background: #333; color: white; border: 2px solid #555; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; pointer-events: auto; }
        button:hover { background: #555; }
        .active { border-color: #00ff00; background: #1a4d1a; }
        .stat { font-size: 24px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        video { display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat" id="score">SCORE: 0</div>
        <div class="stat" id="mode-text">MODE: CHASSEUR</div>
    </div>

    <div id="menu">
        <button onclick="setMode('chasse')" id="btn-chasse" class="active">CHASSE</button>
        <button onclick="setMode('ninja')" id="btn-ninja">NINJA</button>
        <button onclick="setMode('gardien')" id="btn-gardien">GARDIEN</button>
    </div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d');
        
        let score = 0;
        let gameMode = 'chasse'; // chasse, ninja, gardien
        let particles = [];
        let objects = []; // Cibles ou fruits
        let handPos = { x: 0, y: 0, prevX: 0, prevY: 0 };

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function setMode(m) {
            gameMode = m;
            objects = [];
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
            document.getElementById('mode-text').innerText = "MODE: " + m.toUpperCase();
        }

        class GameObject {
            constructor() {
                this.reset();
            }
            reset() {
                this.radius = Math.random() * 20 + 20;
                this.x = Math.random() * (canvasElement.width - 100) + 50;
                if (gameMode === 'ninja' || gameMode === 'gardien') {
                    this.y = canvasElement.height + 50;
                    this.vx = (Math.random() - 0.5) * 10;
                    this.vy = -(Math.random() * 10 + 10);
                } else {
                    this.y = Math.random() * (canvasElement.height - 100) + 50;
                    this.vx = 0; this.vy = 0;
                }
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (gameMode !== 'chasse') this.vy += 0.2; // Gravité
                if (this.y > canvasElement.height + 100 && gameMode === 'gardien') {
                    score = Math.max(0, score - 5); // Pénalité si on rate en mode gardien
                    this.reset();
                }
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 10, 
                    vy: (Math.random() - 0.5) * 10, 
                    life: 1.0, 
                    color 
                });
            }
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Gérer les objets du jeu
            if (objects.length < 5) objects.push(new GameObject());

            objects.forEach((obj, index) => {
                obj.update();
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = obj.color;
                ctx.fill();
                ctx.closePath();
            });

            // Détection de la main
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                handPos.prevX = handPos.x;
                handPos.prevY = handPos.y;
                handPos.x = (1 - hand[8].x) * canvasElement.width;
                handPos.y = hand[8].y * canvasElement.height;

                // Dessiner le pointeur
                ctx.lineWidth = 5;
                ctx.strokeStyle = "white";
                ctx.beginPath();
                ctx.arc(handPos.x, handPos.y, 15, 0, Math.PI * 2);
                ctx.stroke();

                // Logique de collision selon le mode
                objects.forEach((obj, index) => {
                    const dist = Math.hypot(handPos.x - obj.x, handPos.y - obj.y);
                    let hit = false;

                    if (gameMode === 'ninja') {
                        // Collision si le mouvement est rapide (vitesse)
                        const speed = Math.hypot(handPos.x - handPos.prevX, handPos.y - handPos.prevY);
                        if (dist < obj.radius + 20 && speed > 15) hit = true;
                    } else {
                        if (dist < obj.radius + 15) hit = true;
                    }

                    if (hit) {
                        score += 10;
                        document.getElementById('score').innerText = `SCORE: ${score}`;
                        createExplosion(obj.x, obj.y, obj.color);
                        objects.splice(index, 1);
                    }
                });
            }

            // Particules
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 5, 5);
                if (p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
