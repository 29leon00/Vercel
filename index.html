<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR OS - Mirror Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">

    <a-scene background="color: #050505">
        <a-assets>
            <a-mixin id="app-icon" geometry="primitive: plane; width: 0.3; height: 0.3" material="color: #333; shader: flat"></a-mixin>
        </a-assets>

        <a-entity id="main-menu" position="0 1.4 -1.2">
            <a-text value="VR DASHBOARD" align="center" position="0 0.5 0" width="3"></a-text>
            <a-entity id="btn-1" class="app-btn" mixin="app-icon" position="-0.4 0.1 0">
                <a-text value="MUSIC" align="center" position="0 -0.25 0" width="1.5"></a-text>
                <a-box scale="0.1 0.1 0.1" color="#FF4444"></a-box>
            </a-entity>
            <a-entity id="btn-2" class="app-btn" mixin="app-icon" position="0 0.1 0">
                <a-text value="PHOTO" align="center" position="0 -0.25 0" width="1.5"></a-text>
                <a-sphere scale="0.08 0.08 0.08" color="#44FF44"></a-sphere>
            </a-entity>
            <a-entity id="btn-3" class="app-btn" mixin="app-icon" position="0.4 0.1 0">
                <a-text value="WEB" align="center" position="0 -0.25 0" width="1.5"></a-text>
                <a-torus scale="0.06 0.06 0.06" color="#4444FF"></a-torus>
            </a-entity>
        </a-entity>

        <a-sphere id="hand-cursor" radius="0.015" color="#00FF00"></a-sphere>

        <a-entity id="rig"><a-camera look-controls wasd-controls-enabled="false"></a-camera></a-entity>
    </a-scene>

    <video id="input_video" style="display:none;"></video>

    <script>
        const videoElement = document.getElementById('input_video');
        const cursor = document.getElementById('hand-cursor');
        let isMirror = true; // Par défaut en mode miroir (PC)

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8});

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const index = hand[8];
                const thumb = hand[4];

                // LOGIQUE D'INVERSION X : 
                // Si isMirror est vrai, on fait (0.5 - index.x)
                // Si isMirror est faux (cam arrière), on fait (index.x - 0.5)
                let x;
                if (isMirror) {
                    x = (0.5 - index.x) * 2.5; // Mode PC / Selfie
                } else {
                    x = (index.x - 0.5) * 2.5; // Mode Caméra Arrière
                }

                const y = -(index.y - 0.5) * 1.5 + 1.25; 
                const z = -0.9;

                cursor.setAttribute('position', `${x} ${y} ${z}`);
                cursor.setAttribute('visible', 'true');

                const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                cursor.setAttribute('color', dist < 0.05 ? "red" : "green");
            } else {
                cursor.setAttribute('visible', 'false');
            }
        });

        // Détection automatique de la caméra
        const constraints = {
            video: { facingMode: "environment" } // Tente l'arrière d'abord
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                
                // On vérifie quelle caméra a été activée
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                
                // Si facingMode est 'user' ou si on est sur un PC (pas de facingMode), on active le miroir
                isMirror = (settings.facingMode === 'user' || !settings.facingMode);
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({image: videoElement}); },
                    width: 1280, height: 720
                });
                camera.start();
            } catch (err) {
                console.error("Erreur caméra: ", err);
            }
        }

        startCamera();
    </script>
</body>
</html>
