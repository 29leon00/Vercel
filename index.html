<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>6DOF Walking VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; display:flex; justify-content:center; align-items:center; color:white; font-family:sans-serif; text-align:center;">
        <div>
            <h1>LABORATOIRE DE MOUVEMENT</h1>
            <p>Posez le téléphone dans le Cardboard après avoir cliqué.</p>
            <button id="startBtn" style="padding:20px 40px; font-size:20px; cursor:pointer;">ACTIVER LES CAPTEURS</button>
        </div>
    </div>

    <a-scene>
        <a-sky color="#111"></a-sky>
        <a-grid material="color: #222; opacity: 0.5"></a-grid>

        <a-entity id="world">
            <a-box position="-2 0.5 -5" color="red"></a-box>
            <a-box position="2 0.5 -8" color="blue"></a-box>
            <a-box position="0 0.5 -12" color="green"></a-box>
        </a-entity>

        <a-entity id="cameraRig" position="0 0 0">
            <a-entity id="head" camera look-controls position="0 1.6 0">
                <a-cursor color="lime"></a-cursor>
                <a-text id="debug" value="Pret..." position="0 -0.5 -1" align="center" width="2"></a-text>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const cameraRig = document.getElementById('cameraRig');
        const debug = document.getElementById('debug');

        let isWalking = false;
        let stepCount = 0;

        btn.addEventListener('click', () => {
            // Demander la permission pour iOS
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        startTracking();
                    }
                });
            } else {
                startTracking(); // Android
            }
            overlay.style.display = 'none';
        });

        function startTracking() {
            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                // Calcul de la force totale du mouvement
                let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

                // Si l'accélération dépasse un seuil (un pas), on avance la caméra
                if (totalAcc > 13) { 
                    advancePlayer();
                }
            });
        }

        function advancePlayer() {
            // On récupère la direction du regard
            const head = document.getElementById('head');
            const rotation = head.getAttribute('rotation');
            
            // Calcul du vecteur de déplacement
            const angle = rotation.y * (Math.PI / 180);
            const pos = cameraRig.getAttribute('position');
            
            // On avance de 0.2m à chaque pas détecté
            pos.x -= Math.sin(angle) * 0.2;
            pos.z -= Math.cos(angle) * 0.2;
            
            cameraRig.setAttribute('position', pos);
            
            stepCount++;
            debug.setAttribute('value', `Pas detectes: ${stepCount}`);
        }
    </script>
</body>
</html>
