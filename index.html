<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <video id="input_video" style="position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-1;" autoplay playsinline></video>

    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor" ar-mode-ui="enabled: true">
        
        <a-box id="target-box" position="0 1 -2" color="cyan"></a-box>
        
        <a-sphere id="hand-pointer" radius="0.05" color="red"></a-sphere>

        <a-entity id="camera-rig">
            <a-camera id="cam" look-controls="pointerLockEnabled: true"></a-camera>
        </a-entity>

    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const pointer = document.getElementById('hand-pointer');
        const box = document.getElementById('target-box');

        // --- Demande de permission pour les capteurs (Nécessaire sur iOS/Android récents) ---
        function requestPermissions() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission();
            }
        }
        document.body.addEventListener('click', requestPermissions, {once: true});

        // --- IA Détection de Main ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6});

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8];
                const thumb = results.multiHandLandmarks[0][4];

                // Calcul position relative à la caméra
                const cam = document.querySelector('[camera]').object3D;
                const x = (landmark.x - 0.5) * 2;
                const y = -(landmark.y - 0.5) * 2 + 1.5;
                
                pointer.setAttribute('position', `${x + cam.position.x} ${y + cam.position.y} ${cam.position.z - 1}`);
                pointer.setAttribute('visible', 'true');

                // Pincement pour attraper le cube
                const dist = Math.hypot(landmark.x - thumb.x, landmark.y - thumb.y);
                if (dist < 0.05) {
                    box.setAttribute('position', pointer.getAttribute('position'));
                    box.setAttribute('color', 'lime');
                } else {
                    box.setAttribute('color', 'cyan');
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            facingMode: "environment", width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
