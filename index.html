<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>6DOF Real Movement</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local-floor">
      
      <a-entity environment="preset: gridkas; grid: dots; dressingAmount: 100; dressingScale: 0.5"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor color="white"></a-cursor>
        </a-entity>
      </a-entity>

      <a-box position="-2 1 -3" color="#6200EE"></a-box>
      <a-box position="2 1 -3" color="#03DAC6"></a-box>
      <a-box position="0 1 -7" color="#B00020"></a-box>

    </a-scene>

    <script>
      // Force l'activation des capteurs de mouvement sur mobile
      window.addEventListener('touchstart', () => {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission()
            .then(response => {
              if (response == 'granted') {
                console.log("Accès aux mouvements accordé");
              }
            })
            .catch(console.error);
        }
      }, {once: true});
    </script>
  </body>
</html>
