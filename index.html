<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Hand-OS Pro v4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007AFF; --bg: #0b0b0c; --surface: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Curseur avec Inertie */
        #cursor {
            position: fixed; width: 20px; height: 20px; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #cursor.pinch { transform: scale(0.6); background: var(--primary); border-color: var(--primary); }

        /* Interface Material */
        .desktop { display: flex; justify-content: center; gap: 30px; padding-top: 15vh; }
        .app-card {
            background: var(--surface); padding: 25px; border-radius: 24px;
            width: 140px; text-align: center; cursor: pointer; border: 1px solid #333;
            transition: 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .app-card.hover { transform: translateY(-10px); border-color: var(--primary); background: #2c2c2e; }

        /* Windows */
        .window {
            position: fixed; inset: 40px; background: var(--surface); border-radius: 30px;
            display: none; flex-direction: column; z-index: 500; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7); border: 1px solid #333;
        }
        .window.active { display: flex; }
        .header { padding: 20px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .close-btn { background: #ff453a; width: 15px; height: 15px; border-radius: 50%; cursor: pointer; }

        /* Audio Visualizer */
        canvas { width: 100%; height: 250px; border-radius: 15px; background: #000; margin-top: 20px; }
        
        #video_in { display: none; }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="desktop" id="home">
    <div class="app-card" onclick="openApp('music')"><h2>🎵</h2><p>Audio System</p></div>
    <div class="app-card" onclick="openApp('web')"><h2>🌐</h2><p>Web Browser</p></div>
    <div class="app-card" onclick="openApp('settings')"><h2>⚙️</h2><p>Réglages</p></div>
</div>

<div class="window" id="win-music">
    <div class="header"><div class="close-btn" onclick="closeApp()"></div><span>Audio Analyzer</span><div></div></div>
    <div style="padding: 30px; text-align: center;">
        <h2 id="music-title">Musique de l'ordinateur</h2>
        <p>Cliquez sur "Capturer" et choisissez "Audio du système".</p>
        <canvas id="viz"></canvas>
        <button onclick="captureSystemAudio()" style="margin-top:20px; padding:12px 30px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold;">CAPTURER L'AUDIO</button>
    </div>
</div>

<div class="window" id="win-web">
    <div class="header"><div class="close-btn" onclick="closeApp()"></div><span>Navigateur</span><div></div></div>
    <iframe id="browser" src="https://www.wikipedia.org" style="flex-grow:1; border:none;"></iframe>
</div>

<div class="window" id="win-settings">
    <div class="header"><div class="close-btn" onclick="closeApp()"></div><span>Settings</span><div></div></div>
    <div style="padding: 40px;">
        <h3>Lissage du curseur (Inertie)</h3>
        <input type="range" id="smooth-range" min="5" max="40" value="15" style="width:100%">
        <h3>Mode Miroir</h3>
        <button onclick="isMirror = !isMirror" style="padding:10px; background:#444; color:white; border:none; border-radius:8px;">Inverser Gauche/Droite</button>
    </div>
</div>

<video id="video_in"></video>

<script>
    const cursor = document.getElementById('cursor');
    const smoothSlider = document.getElementById('smooth-range');
    let isMirror = true;
    let cX = window.innerWidth/2, cY = window.innerHeight/2;
    let lerpFactor = 0.15; // Lissage par défaut

    // --- TRACKING MAINS ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

    

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const index = res.multiHandLandmarks[0][8];
            const thumb = res.multiHandLandmarks[0][4];

            // Cible
            let targetX = (isMirror ? 1 - index.x : index.x) * window.innerWidth;
            let targetY = index.y * window.innerHeight;

            // Stabilisation (Lerp)
            cX += (targetX - cX) * lerpFactor;
            cY += (targetY - cY) * lerpFactor;

            cursor.style.left = cX + 'px';
            cursor.style.top = cY + 'px';

            // Click Logic
            const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
            if (dist < 0.045) {
                if (!cursor.classList.contains('pinch')) {
                    cursor.classList.add('pinch');
                    const target = document.elementFromPoint(cX, cY);
                    if (target) target.click();
                }
            } else {
                cursor.classList.remove('pinch');
                handleHover(cX, cY);
            }
        }
    });

    // --- AUDIO SYSTEME ---
    async function captureSystemAudio() {
        try {
            // Capture l'audio de l'ordinateur via l'API de partage d'écran
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { displaySurface: "browser" },
                audio: { echoCancellation: false }
            });

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 512;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            const canvas = document.getElementById('viz');
            const canvasCtx = canvas.getContext('2d');

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.fillStyle = '#000';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / bufferLength) * 2;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i];
                    canvasCtx.fillStyle = `hsl(${i + 200}, 80%, 60%)`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
            document.getElementById('music-title').innerText = "Lecture System Audio Active 🔊";
        } catch (err) {
            console.error("Erreur capture audio : ", err);
        }
    }

    // --- INTERFACE ---
    function openApp(id) {
        document.getElementById('win-' + id).classList.add('active');
        document.getElementById('home').style.filter = "blur(10px)";
    }
    function closeApp() {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById('home').style.filter = "none";
    }
    function handleHover(x, y) {
        document.querySelectorAll('.app-card, button, input').forEach(el => {
            const r = el.getBoundingClientRect();
            if (x > r.left && x < r.right && y > r.top && y < r.bottom) el.classList.add('hover');
            else el.classList.remove('hover');
        });
    }

    smoothSlider.oninput = () => { lerpFactor = smoothSlider.value / 100; };

    // --- CAMERA ---
    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video_in').srcObject = stream;
        const camera = new Camera(document.getElementById('video_in'), {
            onFrame: async () => { await hands.send({ image: document.getElementById('video_in') }); },
            width: 1280, height: 720
        });
        camera.start();
    }
    start();
</script>
</body>
</html>
