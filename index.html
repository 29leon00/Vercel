<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { position: absolute; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; color: #0ff; font-size: 40px; text-shadow: 0 0 10px #0ff; z-index: 10; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let score = 0;
        let notes = [];
        const lanes = [canvas.width * 0.25, canvas.width * 0.5, canvas.width * 0.75];
        let handX = 0;

        function spawnNote() {
            notes.push({ x: lanes[Math.floor(Math.random() * 3)], y: -50, speed: 7 });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dessiner les rails
            lanes.forEach(x => {
                ctx.strokeStyle = '#333';
                ctx.strokeRect(x - 40, 0, 80, canvas.height);
            });

            // Gérer les notes
            notes.forEach((n, i) => {
                n.y += n.speed;
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
                ctx.fillRect(n.x - 30, n.y, 60, 20);
                
                // Detection collision zone basse (entre 80% et 90% de l'écran)
                if (n.y > canvas.height * 0.8 && n.y < canvas.height * 0.9) {
                    if (Math.abs(handX - n.x) < 50) {
                        score += 10;
                        scoreEl.innerText = score;
                        notes.splice(i, 1);
                    }
                }
                if (n.y > canvas.height) notes.splice(i, 1);
            });

            // Curseur main
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(handX, canvas.height * 0.85, 20, 0, Math.PI*2); ctx.fill();
        }

        setInterval(spawnNote, 1000);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.onResults(res => {
            if (res.multiHandLandmarks?.[0]) {
                handX = (1 - res.multiHandLandmarks[0][8].x) * canvas.width;
            }
            draw();
        });

        new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        }).start();
    </script>
</body>
</html>
