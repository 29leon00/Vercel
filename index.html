<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Hand-OS Pro v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007AFF; --bg: #000; --panel: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Curseur de Précision */
        #cursor {
            position: fixed; width: 22px; height: 22px; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transition: transform 0.1s; mix-blend-mode: difference;
        }
        #cursor.pinch { transform: scale(0.6); background: var(--primary); }

        /* Dashboard */
        .desktop { display: flex; justify-content: center; gap: 40px; padding-top: 20vh; }
        .app-btn {
            background: var(--panel); padding: 30px; border-radius: 20px;
            width: 150px; text-align: center; border: 2px solid transparent;
            transition: 0.3s; cursor: pointer;
        }
        .app-btn.active { border-color: var(--primary); transform: translateY(-10px); }

        /* Fenêtres */
        .window {
            position: fixed; top: 50px; left: 50px; right: 50px; bottom: 50px;
            background: var(--panel); border-radius: 30px; display: none;
            flex-direction: column; z-index: 500; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .win-header { padding: 20px; display: flex; background: #2c2c2e; }
        .back-btn { background: #3a3a3c; padding: 10px 20px; border-radius: 10px; }

        /* App : Musique */
        #visualizer { width: 100%; height: 200px; background: #000; }

        /* App : Web */
        #web-frame { flex-grow: 1; border: none; background: white; }

        #video_in { display: none; }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="desktop" id="home">
    <div class="app-btn" onclick="showWin('music')"><h2>🎵</h2><p>Audio</p></div>
    <div class="app-btn" onclick="showWin('web')"><h2>🌐</h2><p>Web</p></div>
    <div class="app-btn" onclick="showWin('settings')"><h2>⚙️</h2><p>Réglages</p></div>
</div>

<div class="window" id="win-music">
    <div class="win-header"><div class="back-btn" onclick="closeWin()">← Quitter</div></div>
    <div style="padding: 20px; text-align: center;">
        <h1>Analyseur de Spectre</h1>
        <p>Réagit aux sons captés par votre micro ou votre système.</p>
        <canvas id="visualizer"></canvas>
        <button onclick="initAudio()" style="margin-top:20px; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px;">Activer l'écoute</button>
    </div>
</div>

<div class="window" id="win-web">
    <div class="win-header"><div class="back-btn" onclick="closeWin()">← Quitter</div></div>
    <iframe id="web-frame" src="https://m.wikipedia.org/wiki/Main_Page"></iframe>
</div>

<div class="window" id="win-settings">
    <div class="win-header"><div class="back-btn" onclick="closeWin()">← Quitter</div></div>
    <div style="padding: 40px;">
        <h1>Paramètres Système</h1>
        <label>Luminosité de l'interface</label><br>
        <input type="range" min="20" max="100" value="100" id="bright-slider" style="width:300px">
        <br><br>
        <label>Volume du retour audio (Beep)</label><br>
        <input type="range" min="0" max="100" value="50" style="width:300px">
    </div>
</div>

<video id="video_in" autoplay playsinline></video>

<script>
    const cursor = document.getElementById('cursor');
    const brightness = document.getElementById('bright-slider');
    let isMirror = true;
    let cX = 0, cY = 0; // Position stable
    let canClick = true;

    // --- LOGIQUE STABILISATION ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const idx = res.multiHandLandmarks[0][8];
            const thm = res.multiHandLandmarks[0][4];

            let tx = (isMirror ? 1 - idx.x : idx.x) * window.innerWidth;
            let ty = idx.y * window.innerHeight;

            cX += (tx - cX) * 0.2; // Lissage progressif
            cY += (ty - cY) * 0.2;

            cursor.style.left = cX + 'px';
            cursor.style.top = cY + 'px';

            const dist = Math.hypot(idx.x - thm.x, idx.y - thm.y);
            if (dist < 0.045) {
                cursor.classList.add('pinch');
                if (canClick) { triggerClick(cX, cY); canClick = false; }
            } else {
                cursor.classList.remove('pinch');
                canClick = true;
                updateHover(cX, cY);
            }
        }
    });

    // --- NAVIGATION ---
    function showWin(id) {
        document.querySelectorAll('.window').forEach(w => w.style.display = 'none');
        document.getElementById('win-' + id).style.display = 'flex';
    }
    function closeWin() { document.querySelectorAll('.window').forEach(w => w.style.display = 'none'); }

    function updateHover(x, y) {
        document.querySelectorAll('.app-btn, .back-btn, input').forEach(el => {
            const r = el.getBoundingClientRect();
            if (x > r.left && x < r.right && y > r.top && y < r.bottom) el.style.boxShadow = "0 0 20px #007AFF";
            else el.style.boxShadow = "none";
        });
    }

    function triggerClick(x, y) {
        const target = document.elementFromPoint(x, y);
        if (target) target.click();
    }

    // --- MUSIQUE FONCTIONNELLE (Visualizer) ---
    function initAudio() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                let barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;
                for(let i = 0; i < bufferLength; i++) {
                    let barHeight = dataArray[i]/2;
                    ctx.fillStyle = `rgb(0, 122, 255)`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        });
    }

    // --- RÉGLAGES FONCTIONNELS ---
    brightness.oninput = () => {
        document.body.style.filter = `brightness(${brightness.value}%)`;
    };

    // --- CAMÉRA ---
    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        isMirror = (stream.getVideoTracks()[0].getSettings().facingMode === 'user' || !stream.getVideoTracks()[0].getSettings().facingMode);
        document.getElementById('video_in').srcObject = stream;
        new Camera(document.getElementById('video_in'), {
            onFrame: async () => { await hands.send({ image: document.getElementById('video_in') }); }
        }).start();
    }
    start();
</script>
</body>
</html>
