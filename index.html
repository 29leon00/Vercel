<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Hand Tracking + Real Movement</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #input_video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; 
        }
        #instructions {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 10;
            background: rgba(0,0,0,0.5); padding: 5px;
        }
    </style>
</head>
<body>
    <div id="instructions">Marchez pour vous approcher du cube | Pincez pour déplacer</div>
    <video id="input_video" autoplay playsinline></video>

    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor"
        vr-mode-ui="enabled: true">
        
        <a-assets>
            <img id="grid" src="https://cdn.aframe.io/a-saturday-night/img/grid.png">
        </a-assets>

        <a-plane src="#grid" rotation="-90 0 0" width="20" height="20" opacity="0.2"></a-plane>

        <a-entity id="hand-pointer">
            <a-sphere radius="0.05" color="red"></a-sphere>
        </a-entity>

        <a-box id="target-box" position="0 1 -2" color="#4CC3D9" shadow></a-box>

        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="directional" position="1 2 1"></a-light>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="cam" look-controls wasd-controls-enabled="false"></a-camera>
        </a-entity>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const pointer = document.getElementById('hand-pointer');
        const box = document.getElementById('target-box');
        let isPinching = false;

        // Configuration MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];

                // Calcul position curseur (ajusté pour la caméra arrière)
                const x = (indexTip.x - 0.5) * 3;
                const y = -(indexTip.y - 0.5) * 3 + 1.5;
                const z = -1.2;

                // On attache le curseur relativement à la caméra pour qu'il suive la main
                const camPos = document.getElementById('cam').getAttribute('position');
                pointer.setAttribute('position', `${x + camPos.x} ${y + camPos.y} ${z + camPos.z}`);
                pointer.setAttribute('visible', 'true');

                // Détection Pincement (Pinch)
                const dist = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));

                if (dist < 0.05) {
                    isPinching = true;
                    pointer.querySelector('a-sphere').setAttribute('color', 'green');
                    // Le cube suit la main
                    box.setAttribute('position', `${x + camPos.x} ${y + camPos.y} ${z + camPos.z}`);
                } else {
                    isPinching = false;
                    pointer.querySelector('a-sphere').setAttribute('color', 'red');
                }
            } else {
                pointer.setAttribute('visible', 'false');
            }
        });

        // Lancement Caméra Arrière
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            facingMode: "environment",
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
