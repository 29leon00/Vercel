<!DOCTYPE html>
<html>
<head>
    <title>Hand-OS Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --mac-blur: blur(20px); --accent: #007AFF; }
        body { margin: 0; background: #000 url('https://w.wallhaven.cc/full/85/wallhaven-85m8qy.jpg') center/cover; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* CURSEUR STABILISÉ (Mode Doigt Spécial) */
        #cursor {
            position: fixed; width: 22px; height: 22px; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; transition: transform 0.1s;
        }

        /* LE DOCK (MacOS Style) */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: var(--mac-blur);
            padding: 10px 20px; border-radius: 20px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .app-icon:hover { transform: scale(1.4) translateY(-10px); }

        /* FENÊTRE DYNAMIQUE */
        .window {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 70%;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: var(--mac-blur);
            border-radius: 15px; display: none; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .win-header { padding: 12px; background: rgba(0,0,0,0.2); display: flex; align-items: center; }
        .win-close { width: 12px; height: 12px; background: #ff5f57; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="cursor"></div>
<div class="dock" id="dock">
    </div>

<div id="app-window" class="window">
    <div class="win-header"><div class="win-close" onclick="closeApp()"></div></div>
    <div id="app-content" style="flex:1; padding:20px;"></div>
</div>

<script>
    // --- 2. GESTIONNAIRE D'INSTALLATION (SYSTEME D'APPS) ---
    const System = {
        installedApps: [
            { id: 'finder', icon: '📂', url: 'apps/finder.js' },
            { id: 'writer', icon: '📝', url: 'apps/writer.js' },
            { id: 'store', icon: '🛒', url: 'apps/store.js' }
        ],
        
        init() {
            this.renderDock();
            this.startTracking();
        },

        renderDock() {
            const dock = document.getElementById('dock');
            dock.innerHTML = this.installedApps.map(app => `
                <div class="app-icon" onclick="System.launch('${app.id}')" style="background:#222; display:flex; align-items:center; justify-content:center; font-size:25px;">
                    ${app.icon}
                </div>
            `).join('');
        },

        launch(id) {
            const win = document.getElementById('app-window');
            const content = document.getElementById('app-content');
            win.style.display = 'flex';
            
            // Simulation de chargement d'app "réelle"
            if(id === 'writer') {
                content.innerHTML = `<textarea id="editor" style="width:100%; height:90%; background:white; color:black; font-size:20px;"></textarea>`;
            } else if (id === 'finder') {
                content.innerHTML = `<h2>Mes Fichiers</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="file">📄 Rapport.odt</div><div class="file">📄 Notes.txt</div></div>`;
            } else if (id === 'store') {
                content.innerHTML = `<h2>App Store</h2><button onclick="System.installNew()">Installer : App Dessin 🎨</button>`;
            }
        },

        installNew() {
            this.installedApps.push({ id: 'paint', icon: '🎨', url: 'apps/paint.js' });
            this.renderDock();
            alert("Application installée avec succès !");
        },

        startTracking() {
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });
            
            

            hands.onResults(res => {
                if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    const idx = res.multiHandLandmarks[0][8];
                    const thm = res.multiHandLandmarks[0][4];
                    let x = (1 - idx.x) * window.innerWidth;
                    let y = idx.y * window.innerHeight;
                    
                    const cursor = document.getElementById('cursor');
                    cursor.style.left = x + 'px';
                    cursor.style.top = y + 'px';

                    // Détection du clic (Pinch)
                    if (Math.hypot(idx.x - thm.x, idx.y - thm.y) < 0.05) {
                        const target = document.elementFromPoint(x, y);
                        if (target) target.click();
                    }
                }
            });

            const video = document.createElement('video');
            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); }
            });
            camera.start();
        }
    };

    System.init();
    function closeApp() { document.getElementById('app-window').style.display = 'none'; }
</script>
</body>
</html>
