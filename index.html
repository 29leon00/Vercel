<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Command Center</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="grid" src="https://i.imgur.com/W996zsh.png">
        <audio id="click" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
      </a-assets>

      <a-entity environment="preset: dream; dressing: towers; dressingAmount: 50; dressingScale: 15; grid: cross"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity camera look-controls position="0 1.6 0">
          
          <a-entity id="hud" position="0 0 -1.5">
            <a-ring color="#00FF00" radius-inner="0.08" radius-outer="0.1" position="0.5 0.5 0" rotation="-20 -20 0">
                <a-triangle id="compass-needle" color="red" scale="0.05 0.05 0.05" position="0 0.12 0"></a-triangle>
            </a-ring>
            
            <a-plane id="horizon" width="0.4" height="0.01" color="cyan" position="0 -0.4 0"></a-plane>
            
            <a-entity cursor="fuse: true; fuseTimeout: 500" geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015" material="color: white; shader: flat"></a-entity>
          </a-entity>

          <a-text id="telemetry" value="SYSTEM ONLINE" position="-0.8 -0.6 -1" color="lime" width="1.5"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="world-content">
        <a-box position="-4 2 -6" color="#333" sensor-trigger="type: weather">
            <a-text value="WEATHER" position="0 1 0" align="center"></a-text>
        </a-box>

        <a-sphere position="4 2 -6" color="#6200EE" sensor-trigger="type: sonar" sound="src: #click; on: click; loop: true">
            <a-text value="SONAR" position="0 1 0" align="center"></a-text>
        </a-sphere>
      </a-entity>

    </a-scene>

    <script>
      // GESTION DES CAPTEURS EN TEMPS RÉEL
      const telemetry = document.querySelector('#telemetry');
      const needle = document.querySelector('#compass-needle');
      const horizon = document.querySelector('#horizon');

      // 1. Accéléromètre & Gyroscope (Mouvement du tel)
      window.addEventListener('deviceorientation', (e) => {
        // Mise à jour de la boussole virtuelle
        needle.setAttribute('rotation', `0 0 ${-e.alpha}`);
        // Mise à jour de l'horizon (inclinaison)
        horizon.setAttribute('rotation', `0 0 ${e.gamma}`);
        
        telemetry.setAttribute('value', `ALT: ${Math.round(e.beta)} | DIR: ${Math.round(e.alpha)}`);
      });

      // 2. Interaction Haptique & Capteurs
      AFRAME.registerComponent('sensor-trigger', {
        schema: { type: {type: 'string'} },
        init: function () {
          this.el.addEventListener('mouseenter', () => {
            if (navigator.vibrate) navigator.vibrate(30);
            this.el.setAttribute('scale', '1.2 1.2 1.2');
          });
          this.el.addEventListener('mouseleave', () => {
            this.el.setAttribute('scale', '1 1 1');
          });
          this.el.addEventListener('click', () => {
            if (this.data.type === 'weather') {
               // Action spécifique : changer l'environnement
               const scene = document.querySelector('a-scene');
               scene.setAttribute('environment', 'preset: volcano');
            }
          });
        }
      });

      // Demande d'autorisation pour les capteurs (iOS/Chrome mobile)
      window.addEventListener('touchstart', () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission();
        }
      }, {once: true});
    </script>
  </body>
</html>
