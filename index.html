<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR 6DoF Hand Tracking</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #input_video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .ar-button { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px; background: #222; color: white; border-radius: 10px; z-index: 100; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>

    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor"
        vr-mode-ui="enabled: true"
        renderer="antialias: true; alpha: true">
        
        <a-assets>
            <img id="grid" src="https://cdn.aframe.io/a-saturday-night/img/grid.png">
        </a-assets>

        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" src="#grid" repeat="20 20" opacity="0.3"></a-plane>

        <a-box id="target-box" position="0 1.2 -2" color="#4CC3D9" shadow></a-box>

        <a-sphere id="hand-cursor" radius="0.05" color="red"></a-sphere>

        <a-entity id="camera-rig" position="0 0 0">
            <a-camera id="cam" look-controls="enabled: true" wasd-controls-enabled="false">
                <a-light type="point" intensity="0.8" position="0 0 0"></a-light>
            </a-camera>
        </a-entity>

        <a-light type="ambient" intensity="0.5"></a-light>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const cursor = document.getElementById('hand-cursor');
        const box = document.getElementById('target-box');
        const cameraEl = document.getElementById('cam');

        let isPinching = false;

        // Configuration MediaPipe pour la main
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1, // 1 pour la rapidité sur mobile
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const thumbTip = landmarks[4];

                // --- LOGIQUE DE POSITIONNEMENT 3D ---
                // On récupère la position et la rotation actuelle de la caméra du téléphone (6DoF)
                const camPos = cameraEl.object3D.position;
                const camRot = cameraEl.object3D.rotation;

                // On projette la main devant la caméra, peu importe où l'utilisateur a marché
                const x = (indexTip.x - 0.5) * 2; 
                const y = -(indexTip.y - 0.5) * 2 + 1.5;
                const z = -1.2; // La main est toujours à 1.2m de la caméra

                // Application de la position relative à la caméra
                cursor.object3D.position.set(camPos.x + x, camPos.y + (y - 1.5), camPos.z + z);
                cursor.setAttribute('visible', 'true');

                // --- PINCH (Attraper le cube) ---
                const distance = Math.sqrt(Math.pow(indexTip.x - thumbTip.x, 2) + Math.pow(indexTip.y - thumbTip.y, 2));

                if (distance < 0.06) {
                    cursor.setAttribute('color', 'green');
                    isPinching = true;
                    // Le cube suit la main
                    box.object3D.position.copy(cursor.object3D.position);
                } else {
                    cursor.setAttribute('color', 'red');
                    isPinching = false;
                }
            } else {
                cursor.setAttribute('visible', 'false');
            }
        });

        // Lancement de la caméra arrière
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            facingMode: "environment",
            width: 640, // Résolution réduite pour économiser le processeur
            height: 480
        });
        camera.start();

        // Correction pour le mode Cardboard : forcer le 6DoF si disponible
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
            console.log("Entrée en mode VR/AR");
        });
    </script>
</body>
</html>
