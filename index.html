<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Void Defender VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <audio id="exp-snd" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
        </a-assets>

        <a-entity environment="preset: tron; lighting: point; dressingAmount: 50"></a-entity>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: true; fuseTimeout: 500" 
                      position="0 0 -1" 
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" 
                      material="color: #FF0000; shader: flat">
            </a-entity>
            <a-text id="score" value="Score: 0" position="-0.5 0.5 -1" color="#00FF00" width="2"></a-text>
        </a-entity>

        <a-entity id="enemy-container"></a-entity>
    </a-scene>

    <script>
        let score = 0;
        const enemyContainer = document.querySelector('#enemy-container');
        const scoreText = document.querySelector('#score');

        // Fonction pour créer un ennemi
        function spawnEnemy() {
            const enemy = document.createElement('a-entity');
            
            // Position aléatoire sur une sphère autour du joueur
            const angle = Math.random() * Math.PI * 2;
            const x = Math.cos(angle) * 10;
            const z = Math.sin(angle) * 10;
            const y = (Math.random() * 4) + 0.5;

            enemy.setAttribute('geometry', 'primitive: torusKnot; p: 2; q: 3; radius: 0.5; radiusTubular: 0.05');
            enemy.setAttribute('material', 'color: #FF00FF; emissive: #660066');
            enemy.setAttribute('position', `${x} ${y} ${z}`);
            enemy.setAttribute('class', 'enemy');

            // Animation : l'ennemi fonce vers le joueur
            enemy.setAttribute('animation', `property: position; to: 0 1.6 0; dur: 8000; easing: linear`);

            // Interaction : détruit au regard
            enemy.addEventListener('mouseenter', function () {
                score += 10;
                scoreText.setAttribute('value', 'Score: ' + score);
                
                // Effet d'explosion simple
                enemy.setAttribute('geometry', 'primitive: sphere; radius: 0.2');
                enemy.setAttribute('material', 'color: yellow');
                
                setTimeout(() => {
                    if(enemy.parentNode) enemy.parentNode.removeChild(enemy);
                }, 100);
                
                // On en recrée deux pour augmenter la difficulté
                spawnEnemy();
                setTimeout(spawnEnemy, 1000);
            });

            enemyContainer.appendChild(enemy);
        }

        // Lancer le premier ennemi
        spawnEnemy();
    </script>
</body>
</html>
