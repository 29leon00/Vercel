<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NEURAL PULSE VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #000; density: 0.2">
      
      <a-sky color="#000"></a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-entity id="magnet" position="0 0 -2"></a-entity>
      </a-entity>

      <a-entity id="web-container"></a-entity>

    </a-scene>

    <script>
      const container = document.querySelector('#web-container');
      const magnet = document.querySelector('#magnet');
      const nodes = [];

      // Création de 200 filaments réactifs
      for (let i = 0; i < 200; i++) {
        let node = document.createElement('a-torus-knot');
        let pos = {
          x: (Math.random() - 0.5) * 30,
          y: (Math.random() - 0.5) * 30,
          z: (Math.random() - 0.5) * 30
        };

        node.setAttribute('position', pos);
        node.setAttribute('radius', Math.random() * 0.5);
        node.setAttribute('radius-tubular', 0.01);
        node.setAttribute('p', 2);
        node.setAttribute('q', 7);
        node.setAttribute('material', 'shader: flat; color: #ff00ff');
        
        container.appendChild(node);
        nodes.push({el: node, origin: pos, phase: Math.random() * Math.PI * 2});
      }

      function animate() {
        let time = Date.now() * 0.002;
        
        nodes.forEach(node => {
          // 1. Mouvement organique (onde de sinus)
          let newX = node.origin.x + Math.sin(time + node.phase) * 2;
          let newY = node.origin.y + Math.cos(time + node.phase) * 2;
          
          // 2. Réaction à la vue (l'objet "fuit" ou "suit" ton regard)
          // On change la couleur selon la position
          let hue = (Math.sin(time + node.phase) * 127 + 128);
          node.el.setAttribute('material', 'color', `hsl(${hue}, 100%, 50%)`);
          
          // 3. Rotation constante pour l'effet hypnotique
          node.el.setAttribute('rotation', `${time * 20} ${time * 10} 0`);
          node.el.setAttribute('position', `${newX} ${newY} ${node.origin.z}`);
        });

        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
