<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Material VR Hub</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene shadow="type: pcfsoft">
        
        <a-entity environment="preset: contact; groundColor: #ffffff; grid: none; lighting: none"></a-entity>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 5 1" intensity="0.5" castShadow="true"></a-light>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: true; fuseTimeout: 800"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.02"
                      material="color: #6200EE; shader: flat">
                <a-animation begin="fusing" attribute="scale" from="1 1 1" to="0.5 0.5 0.5" dur="800"></a-animation>
            </a-entity>
        </a-entity>

        <a-entity position="-3 0 -5">
            <a-text value="PHYSICS" align="center" position="0 2.5 0" color="#333"></a-text>
            <a-box id="physic-box" position="0 1 0" color="#03DAC6" shadow
                   animation="property: position; to: 0 2 0; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine">
            </a-box>
            <a-cylinder radius="0.5" height="0.1" color="#eee"></a-cylinder>
        </a-entity>

        <a-entity position="0 0 -6">
            <a-text value="SPATIAL AUDIO" align="center" position="0 2.5 0" color="#333"></a-text>
            <a-torus-knot id="sound-node" radius="0.4" radius-tubular="0.05" color="#6200EE" shadow
                          sound="src: url(https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3); on: mouseenter">
            </a-torus-knot>
            <a-text value="(Regardez pour déclencher)" position="0 0.5 0" align="center" width="2" color="#666"></a-text>
        </a-entity>

        <a-entity position="3 0 -5">
            <a-text value="VISION" align="center" position="0 2.5 0" color="#333"></a-text>
            <a-sphere id="vision-sphere" position="0 1 0" radius="0.6" color="#B00020" shadow
                      event-set__click="_target: a-scene; background: color: #000"></a-sphere>
        </a-entity>

    </a-scene>

    <script>
        // Module de vibration haptique Material Design
        const interactibles = document.querySelectorAll('a-box, a-sphere, a-torus-knot');
        interactibles.forEach(el => {
            el.addEventListener('mouseenter', () => {
                if (navigator.vibrate) navigator.vibrate(20);
                // Feedback visuel sobre : on augmente légèrement l'émissivité
                el.setAttribute('material', 'emissive', el.getAttribute('color'));
                el.setAttribute('material', 'emissiveIntensity', '0.2');
            });
            el.addEventListener('mouseleave', () => {
                el.setAttribute('material', 'emissiveIntensity', '0');
            });
        });

        // Interaction spécifique pour la sphère (Changement de mode)
        document.querySelector('#vision-sphere').addEventListener('click', () => {
            const scene = document.querySelector('a-scene');
            const isDark = scene.getAttribute('background').color === '#000';
            scene.setAttribute('background', 'color', isDark ? '#FFF' : '#000');
        });
    </script>
</body>
</html>
