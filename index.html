<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Functional Hand-OS v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF; /* Bleu iOS/Material */
            --bg: #000000;
            --card: #1C1C1E;
            --text: #FFFFFF;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        /* Curseur Stabilisé */
        #cursor {
            position: fixed; width: 24px; height: 24px;
            border: 2px solid var(--text); border-radius: 50%;
            pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            mix-blend-mode: difference;
        }
        #cursor.clicking { transform: scale(0.6); background: var(--primary); border-color: var(--primary); }

        /* Dashboard */
        .desktop {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
            padding: 100px; height: 100%; align-content: center;
        }

        .app-icon {
            background: var(--card); border-radius: 24px; padding: 40px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .app-icon.hover { transform: scale(1.05); border-color: var(--primary); background: #2C2C2E; }
        .app-icon h2 { margin: 15px 0 0; font-weight: 500; font-size: 1.2rem; }

        /* Fenêtres */
        .window {
            position: fixed; inset: 50px; background: var(--card);
            border-radius: 32px; display: none; flex-direction: column;
            padding: 40px; z-index: 500; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .window.active { display: flex; }
        .close-btn { 
            position: absolute; top: 30px; left: 30px; padding: 10px 20px;
            background: #3A3A3C; border-radius: 12px; font-weight: bold;
        }

        #video_stream { display: none; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="desktop" id="desktop">
        <div class="app-icon" data-target="win-music">
            <span style="font-size: 50px">🎵</span>
            <h2>Musique</h2>
        </div>
        <div class="app-icon" data-target="win-browser">
            <span style="font-size: 50px">🌐</span>
            <h2>Browser</h2>
        </div>
        <div class="app-icon" data-target="win-settings">
            <span style="font-size: 50px">⚙️</span>
            <h2>Settings</h2>
        </div>
    </div>

    <div class="window" id="app-window">
        <div class="close-btn" id="close-btn">← RETOUR</div>
        <h1 id="win-title" style="margin-top: 60px; font-size: 3rem;">App</h1>
        <div id="win-content" style="font-size: 1.5rem; color: #8E8E93;"></div>
    </div>

    <video id="video_stream" autoplay playsinline></video>

    <script>
        const cursor = document.getElementById('cursor');
        const desktop = document.getElementById('desktop');
        const appWindow = document.getElementById('app-window');
        
        let isMirror = true;
        let cX = 0, cY = 0; // Coordonnées actuelles lissées
        const smoothing = 0.2; // Entre 0.1 (très lent/stable) et 1 (réactif/tremblant)
        let isPinching = false;
        let lastClickTime = 0;

        // --- Configuration MediaPipe ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

        

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8]; // Index tip
                const thumb = results.multiHandLandmarks[0][4]; // Thumb tip

                // 1. Calcul des positions avec inversion miroir
                let targetX = (isMirror ? 1 - landmark.x : landmark.x) * window.innerWidth;
                let targetY = landmark.y * window.innerHeight;

                // 2. Lissage (Interpolation linéaire)
                cX += (targetX - cX) * smoothing;
                cY += (targetY - cY) * smoothing;

                cursor.style.left = `${cX}px`;
                cursor.style.top = `${cY}px`;

                // 3. Détection du clic (Pinch)
                const distance = Math.hypot(landmark.x - thumb.x, landmark.y - thumb.y);
                
                if (distance < 0.045) { // Seuil de pincement
                    if (!isPinching) {
                        isPinching = true;
                        cursor.classList.add('clicking');
                        executeClick(cX, cY);
                    }
                } else {
                    isPinching = false;
                    cursor.classList.remove('clicking');
                    highlightHover(cX, cY);
                }
            }
        });

        // --- Logique Fonctionnelle ---
        function highlightHover(x, y) {
            const icons = document.querySelectorAll('.app-icon, .close-btn');
            icons.forEach(icon => {
                const r = icon.getBoundingClientRect();
                if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
                    icon.classList.add('hover');
                } else {
                    icon.classList.remove('hover');
                }
            });
        }

        function executeClick(x, y) {
            const now = Date.now();
            if (now - lastClickTime < 600) return; // Anti-double clic involontaire
            
            const target = document.elementFromPoint(x, y);
            const btn = target ? target.closest('.app-icon, .close-btn') : null;

            if (btn) {
                if (btn.id === 'close-btn') {
                    appWindow.classList.remove('active');
                } else {
                    const appName = btn.querySelector('h2').innerText;
                    document.getElementById('win-title').innerText = appName;
                    document.getElementById('win-content').innerText = `Chargement de l'interface ${appName}...`;
                    appWindow.classList.add('active');
                }
                lastClickTime = now;
            }
        }

        // --- Init Caméra ---
        async function start() {
            const stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "environment" }});
            const settings = stream.getVideoTracks()[0].getSettings();
            isMirror = (settings.facingMode === 'user' || !settings.facingMode);
            
            document.getElementById('video_stream').srcObject = stream;
            const camera = new Camera(document.getElementById('video_stream'), {
                onFrame: async () => { await hands.send({image: document.getElementById('video_stream')}); },
                width: 1280, height: 720
            });
            camera.start();
        }

        start();
    </script>
</body>
</html>
