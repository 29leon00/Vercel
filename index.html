<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Hand-OS Master Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --mac-bg: rgba(255, 255, 255, 0.2); --mac-blur: blur(20px); --accent: #007AFF; }
        body { 
            margin: 0; height: 100vh; overflow: hidden; color: white;
            font-family: -apple-system, system-ui, sans-serif;
            background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&w=2000') center/cover;
        }

        /* --- CURSEUR STABILISÉ --- */
        #cursor {
            position: fixed; width: 22px; height: 22px; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; transition: transform 0.1s;
        }
        #cursor.click { transform: scale(0.6); background: var(--accent); }

        /* --- DOCK MACOS STYLE --- */
        .dock-wrapper { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .dock {
            background: var(--mac-bg); backdrop-filter: var(--mac-blur);
            padding: 10px; border-radius: 20px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.2); align-items: flex-end;
        }
        .dock-item {
            width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; transition: all 0.2s cubic-bezier(0.12, 0, 0.39, 0);
        }
        .dock-item:hover, .dock-item.active { width: 75px; height: 75px; font-size: 45px; }

        /* --- WINDOW MANAGER --- */
        .window {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 70%;
            background: rgba(28, 28, 30, 0.9); backdrop-filter: var(--mac-blur);
            border-radius: 15px; display: none; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        .win-header { padding: 12px; background: rgba(0,0,0,0.2); display: flex; align-items: center; border-radius: 15px 15px 0 0; }
        .win-close { width: 12px; height: 12px; background: #ff5f57; border-radius: 50%; cursor: pointer; margin-right: 15px; }
        .win-content { flex: 1; overflow: auto; padding: 20px; }

        /* --- APPS --- */
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, 100px); gap: 20px; }
        .file { text-align: center; cursor: pointer; padding: 10px; border-radius: 10px; }
        .file:hover { background: rgba(255,255,255,0.1); }
        
        #writer-area { width: 100%; height: 100%; border: none; background: white; color: black; padding: 30px; font-size: 18px; box-sizing: border-box; }

        /* --- CLAVIER VIRTUEL --- */
        #kb { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); display: none; background: #111; padding: 10px; border-radius: 10px; grid-template-columns: repeat(10, 40px); gap: 5px; z-index: 2000; }
        .key { width: 40px; height: 40px; background: #333; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-size: 12px; }

        #v-stream { position: fixed; top: 10px; right: 10px; width: 120px; border-radius: 10px; transform: scaleX(-1); opacity: 0.5; }
    </style>
</head>
<body>

<div id="cursor"></div>
<video id="v-stream" autoplay playsinline></video>

<div class="dock-wrapper">
    <div class="dock">
        <div class="dock-item" onclick="AppManager.open('finder')">📂</div>
        <div class="dock-item" onclick="AppManager.open('writer')">📝</div>
        <div class="dock-item" onclick="AppManager.open('web')">🌐</div>
        <div class="dock-item" onclick="AppManager.open('settings')">⚙️</div>
    </div>
</div>

<div id="os-window" class="window">
    <div class="win-header">
        <div class="win-close" onclick="AppManager.close()"></div>
        <span id="win-title">Finder</span>
    </div>
    <div id="win-content" class="win-content"></div>
</div>

<div id="kb"></div>

<script>
    const cursor = document.getElementById('cursor');
    let isMirror = true;
    let cX = 0, cY = 0;

    // --- 1. GESTIONNAIRE D'APPLICATIONS ET FICHIERS ---
    const AppManager = {
        current: null,
        files: [
            { name: "Projet_A.odt", type: "writer", icon: "📄" },
            { name: "Note_Perso.odt", type: "writer", icon: "📄" },
            { name: "Wikipedia", type: "web", icon: "🌐" }
        ],
        open(id) {
            this.current = id;
            document.getElementById('os-window').style.display = 'flex';
            document.getElementById('win-title').innerText = id.toUpperCase();
            this.render();
            document.getElementById('kb').style.display = (id === 'writer') ? 'grid' : 'none';
        },
        close() { 
            document.getElementById('os-window').style.display = 'none';
            document.getElementById('kb').style.display = 'none';
        },
        render() {
            const container = document.getElementById('win-content');
            if (this.current === 'finder') {
                container.innerHTML = `<div class="file-grid">${this.files.map(f => `
                    <div class="file" onclick="AppManager.open('${f.type}')">
                        <div style="font-size:40px">${f.icon}</div>
                        <div style="font-size:12px">${f.name}</div>
                    </div>`).join('')}</div>`;
            } else if (this.current === 'writer') {
                container.innerHTML = `<textarea id="writer-area" placeholder="Tapez avec le clavier virtuel..."></textarea>`;
            } else if (this.current === 'web') {
                container.innerHTML = `<iframe src="https://m.wikipedia.org" style="width:100%;height:100%;border:none;"></iframe>`;
            } else {
                container.innerHTML = `<h3>Paramètres</h3><button onclick="isMirror=!isMirror">Inverser Miroir</button>`;
            }
        }
    };

    // --- 2. CLAVIER VIRTUEL ---
    const keys = "AZERTYUIOPQSDFGHJKLM WXC VBN".split("");
    const kb = document.getElementById('kb');
    keys.forEach(k => {
        const keyEl = document.createElement('div');
        keyEl.className = 'key';
        keyEl.innerText = k;
        keyEl.onclick = () => {
            const area = document.getElementById('writer-area');
            if(area) area.value += k;
        };
        kb.appendChild(keyEl);
    });

    // --- 3. TRACKING IA (STABILISÉ) ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

    

    hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const idx = res.multiHandLandmarks[0][8];
            const thm = res.multiHandLandmarks[0][4];

            let tx = (isMirror ? 1 - idx.x : idx.x) * window.innerWidth;
            let ty = idx.y * window.innerHeight;

            // Filtre de stabilisation (Lerp)
            cX += (tx - cX) * 0.2;
            cY += (ty - cY) * 0.2;

            cursor.style.left = cX + 'px';
            cursor.style.top = cY + 'px';

            const dist = Math.hypot(idx.x - thm.x, idx.y - thm.y);
            if (dist < 0.05) {
                if(!cursor.classList.contains('click')) {
                    cursor.classList.add('click');
                    const el = document.elementFromPoint(cX, cY);
                    if(el) el.click();
                }
            } else {
                cursor.classList.remove('click');
                // Simuler le survol pour les effets de dock
                checkHover(cX, cY);
            }
        }
    });

    function checkHover(x, y) {
        document.querySelectorAll('.dock-item, .key, .file, .win-close').forEach(el => {
            const r = el.getBoundingClientRect();
            if (x > r.left && x < r.right && y > r.top && y < r.bottom) el.classList.add('active');
            else el.classList.remove('active');
        });
    }

    // --- 4. INITIALISATION ---
    async function start() {
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        document.getElementById('v-stream').srcObject = stream;
        new Camera(document.getElementById('v-stream'), {
            onFrame: async () => { await hands.send({image: document.getElementById('v-stream')}); }
        }).start();
    }
    start();
</script>
</body>
</html>
