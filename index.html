<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>A55 Motion Fix</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; font-family: sans-serif; text-align: center; }
        button { padding: 10px; margin: 5px; background: #6200ee; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <p>Sensibilité: <span id="sensVal">1.5</span></p>
        <button onclick="changeSens(-0.1)">- Sensible</button>
        <button onclick="changeSens(0.1)">+ Sensible</button>
        <br><br>
        <button id="startBtn" style="background: green;">CLIQUE ICI POUR ACTIVER</button>
    </div>

    <a-scene>
        <a-sky color="#000"></a-sky>
        <a-grid material="color: #444; src: https://i.imgur.com/W996zsh.png; repeat: 100 100"></a-grid>
        
        <a-entity id="world">
            <a-box position="0 0.5 -5" color="red" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
            <a-sphere position="3 1 -10" color="blue"></a-sphere>
            <a-cylinder position="-3 0.75 -15" color="green"></a-cylinder>
        </a-entity>

        <a-entity id="cameraRig">
            <a-entity id="head" camera look-controls position="0 1.6 0">
                <a-cursor color="yellow"></a-cursor>
                <a-text id="debug" value="Initialisation..." position="0 -0.5 -1" align="center" width="2"></a-text>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        let sensitivity = 1.5; // Seuil de détection du pas
        let cameraRig = document.querySelector('#cameraRig');
        let head = document.querySelector('#head');
        let debug = document.querySelector('#debug');
        let lastStepTime = 0;

        function changeSens(val) {
            sensitivity = Math.round((sensitivity + val) * 10) / 10;
            document.querySelector('#sensVal').innerText = sensitivity;
        }

        document.querySelector('#startBtn').addEventListener('click', function() {
            this.parentElement.style.display = 'none';
            
            window.addEventListener('devicemotion', (event) => {
                let acc = event.acceleration; // Accélération pure sans gravité
                if (!acc.x) acc = event.accelerationIncludingGravity;

                // On calcule la force globale sur les 3 axes
                let magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                
                // On retire la gravité si nécessaire (si magnitude est autour de 9.8 au repos)
                let netAcc = Math.abs(magnitude - 9.8);

                // Détection du pas (ne pas détecter 2 pas trop vite)
                if (netAcc > sensitivity && Date.now() - lastStepTime > 300) {
                    moveForward();
                    lastStepTime = Date.now();
                }
            });
        });

        function moveForward() {
            let rotation = head.getAttribute('rotation');
            let angle = rotation.y * (Math.PI / 180);
            let pos = cameraRig.getAttribute('position');

            // On avance dans la direction du regard
            pos.x -= Math.sin(angle) * 0.4;
            pos.z -= Math.cos(angle) * 0.4;
            
            cameraRig.setAttribute('position', pos);
            debug.setAttribute('value', "Pas détecté !");
            setTimeout(() => debug.setAttribute('value', ""), 200);
        }
    </script>
</body>
</html>
