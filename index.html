<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HYPERSPACE VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #000; density: 0.15">
      
      <a-assets>
        <img id="grid" src="https://i.imgur.com/mYmmbrp.png">
      </a-assets>

      <a-entity id="player" position="0 0 0">
        <a-camera washer-controls="enabled: false" look-controls>
            <a-cursor color="cyan"></a-cursor>
            <a-text id="dist" value="0m" position="0 -0.5 -1" align="center" color="yellow"></a-text>
        </a-camera>
      </a-entity>

      <a-entity id="tunnel-container"></a-entity>

      <a-light type="ambient" color="#222"></a-light>
      <a-light type="point" color="cyan" intensity="2" position="0 0 -2"></a-light>
    </a-scene>

    <script>
      const scene = document.querySelector('#tunnel-container');
      const distText = document.querySelector('#dist');
      let distance = 0;
      const speed = 0.4; // Vitesse de déplacement

      // Création de segments de tunnel pour simuler l'infini
      function createSegment(z) {
        const segment = document.createElement('a-cylinder');
        segment.setAttribute('radius', '5');
        segment.setAttribute('height', '20');
        segment.setAttribute('rotation', '90 0 0');
        segment.setAttribute('position', `0 0 ${z}`);
        segment.setAttribute('material', `src: #grid; side: double; repeat: 1 5; metalness: 0.6; roughness: 0.2`);
        segment.setAttribute('open-ended', 'true');
        segment.classList.add('segment');
        scene.appendChild(segment);
      }

      // Initialisation (10 segments)
      for (let i = 0; i < 10; i++) {
        createSegment(-i * 20);
      }

      // Boucle de jeu
      function update() {
        distance += speed;
        distText.setAttribute('value', Math.floor(distance) + "m");

        // Faire défiler tous les segments vers le joueur
        const segments = document.querySelectorAll('.segment');
        segments.forEach(seg => {
          let pos = seg.getAttribute('position');
          pos.z += speed;
          
          // Si le segment est derrière le joueur, on le remet devant
          if (pos.z > 20) {
            pos.z = -180;
            // On change la couleur aléatoirement pour l'effet psychédélique
            const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0000'];
            seg.setAttribute('material', 'color', colors[Math.floor(Math.random()*colors.length)]);
          }
          seg.setAttribute('position', pos);
        });

        requestAnimationFrame(update);
      }

      update();
    </script>
  </body>
</html>
