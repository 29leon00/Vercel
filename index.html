<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CITY DESTROYER VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <audio id="boom" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
      </a-assets>

      <a-entity environment="preset: moon; lighting: point; dressing: towers; dressingAmount: 100; dressingColor: #333"></a-entity>

      <a-entity id="rig" position="0 0 0" 
                animation="property: position; to: 0 0 -500; dur: 20000; easing: linear">
        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: false" position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
                      material="color: #FF0000; shader: flat">
            </a-entity>
            <a-light type="spot" color="red" intensity="5" distance="20"></a-light>
        </a-entity>
      </a-entity>

      <a-entity id="targets"></a-entity>

    </a-scene>

    <script>
      const targetContainer = document.querySelector('#targets');
      
      // On crée des "bâtiments" de verre qui explosent
      for (let i = 0; i < 50; i++) {
        let box = document.createElement('a-box');
        let zPos = -(i * 10) - 20;
        let xPos = (Math.random() - 0.5) * 10;
        let yPos = Math.random() * 10;

        box.setAttribute('position', `${xPos} ${yPos} ${zPos}`);
        box.setAttribute('scale', '2 5 2');
        box.setAttribute('material', 'color: #00e5ff; opacity: 0.7; transparent: true; metalness: 1');
        box.setAttribute('class', 'target');
        
        // Effet au regard : EXPLOSION
        box.addEventListener('mouseenter', function () {
          box.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 200');
          box.setAttribute('material', 'color: orange; emissive: red');
          
          // Flash lumineux de l'explosion
          let flash = document.createElement('a-light');
          flash.setAttribute('type', 'point');
          flash.setAttribute('color', 'orange');
          flash.setAttribute('position', box.getAttribute('position'));
          document.querySelector('a-scene').appendChild(flash);
          
          setTimeout(() => flash.parentNode.removeChild(flash), 300);
        });

        targetContainer.appendChild(box);
      }

      // Variation de hauteur pour le "grand huit"
      const rig = document.querySelector('#rig');
      let time = 0;
      function moveY() {
        time += 0.02;
        let currentPos = rig.getAttribute('position');
        currentPos.y = Math.sin(time) * 5 + 5; // Oscillation verticale
        rig.setAttribute('position', currentPos);
        requestAnimationFrame(moveY);
      }
      moveY();
    </script>
  </body>
</html>
