<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SENSOR X-PERIENCE</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene boussole-handler>
        <a-assets>
            <audio id="static-noise" src="https://actions.google.com/sounds/v1/science_fiction/glitchy_digital_transmission.ogg" preload="auto"></audio>
        </a-assets>

        <a-entity environment="preset: contact; dressingAmount: 200; grid: dots; groundColor: #111"></a-entity>

        <a-entity id="rig" camera look-controls position="0 1.6 0" vibration-sensor>
            <a-entity cursor="fuse: true; fuseTimeout: 100"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #00FF00; shader: flat">
            </a-entity>
            <a-plane id="glitch-overlay" position="0 0 -0.5" width="2" height="2" 
                     material="color: red; opacity: 0; shader: flat" visible="false"></a-plane>
        </a-entity>

        <a-entity id="north-pole" position="0 0 -10">
            <a-sphere radius="2" color="cyan" wireframe="true" animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"></a-sphere>
            <a-text value="MAGNETIC NORTH" align="center" position="0 3 0" color="cyan"></a-text>
            <a-entity sound="src: #static-noise; autoplay: true; loop: true; volume: 0.5; rolloffFactor: 5"></a-entity>
        </a-entity>

        <a-entity id="ambient-data"></a-entity>
    </a-scene>

    <script>
        // 1. GESTION DU MAGNÉTOMÈTRE (Boussole)
        AFRAME.registerComponent('boussole-handler', {
            init: function () {
                const northPole = document.querySelector('#north-pole');
                window.addEventListener('deviceorientationabsolute', (event) => {
                    if (event.alpha !== null) {
                        // Aligne l'objet virtuel sur le nord réel
                        let compass = event.alpha; 
                        northPole.setAttribute('rotation', `0 ${compass} 0`);
                    }
                }, true);
            }
        });

        // 2. GESTION DE L'ACCÉLÉROMÈTRE (Secousses)
        AFRAME.registerComponent('vibration-sensor', {
            init: function () {
                this.lastX = 0; this.lastY = 0; this.lastZ = 0;
                const overlay = document.querySelector('#glitch-overlay');

                window.addEventListener('devicemotion', (event) => {
                    let acc = event.accelerationIncludingGravity;
                    let delta = Math.abs(acc.x - this.lastX) + Math.abs(acc.y - this.lastY);
                    
                    if (delta > 15) { // Seuil de secousse
                        overlay.setAttribute('visible', 'true');
                        overlay.setAttribute('material', 'opacity', '0.3');
                        if (navigator.vibrate) navigator.vibrate(50); // Retour haptique
                        setTimeout(() => overlay.setAttribute('visible', 'false'), 100);
                    }
                    this.lastX = acc.x; this.lastY = acc.y; this.lastZ = acc.z;
                });
            }
        });

        // 3. RETOUR HAPTIQUE AU REGARD
        document.querySelectorAll('a-entity').forEach(el => {
            el.addEventListener('mouseenter', () => {
                if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
            });
        });

        // Génération d'objets réactifs partout
        const container = document.querySelector('#ambient-data');
        for(let i=0; i<50; i++) {
            let box = document.createElement('a-box');
            box.setAttribute('position', `${(Math.random()-0.5)*20} ${(Math.random()*5)} ${(Math.random()-0.5)*20}`);
            box.setAttribute('scale', '0.2 0.2 0.2');
            box.setAttribute('material', 'color: #444; emissive: #00FF00');
            box.setAttribute('animation', `property: position; dir: alternate; loop: true; to: ${Math.random()*2} 1 ${Math.random()*2}; dur: ${2000 + Math.random()*3000}`);
            container.appendChild(box);
        }
    </script>
</body>
</html>
