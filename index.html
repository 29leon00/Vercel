<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Expérience VR Immersive</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene bloom="radius: 0.66">
      
      <a-entity environment="preset: starry; seed: 42; lighting: point; ground: spikes"></a-entity>

      <a-assets>
        <audio id="click-sound" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3"></audio>
      </a-assets>

      <a-entity position="0 2 -4">
        <a-octahedron 
          id="main-orb"
          color="#00FFD1" 
          radius="0.8"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
          animation__hover="property: scale; startEvents: mouseenter; from: 1 1 1; to: 1.5 1.5 1.5; dur: 300"
          animation__leave="property: scale; startEvents: mouseleave; from: 1.5 1.5 1.5; to: 1 1 1; dur: 300"
          sound="on: click; src: #click-sound">
          
          <a-light type="point" intensity="2" color="#00FFD1"></a-light>
        </a-octahedron>
      </a-entity>

      <a-entity position="0 2.25 -15" particle-system="color: #EF0000,#44CC00"></a-entity>

      <a-entity camera look-controls position="0 1.6 0">
        <a-entity cursor="fuse: true; fuseTimeout: 1500"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                  material="color: white; shader: flat">
          <a-animation begin="fusing" easing="ease-in" attribute="scale"
                       fill="backwards" from="1 1 1" to="0.1 0.1 0.1" dur="1500"></a-animation>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // Petit script pour changer la couleur de l'orbe aléatoirement au clic
      const orb = document.querySelector('#main-orb');
      orb.addEventListener('click', function () {
        const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        orb.setAttribute('color', randomColor);
        // On peut aussi changer la forme !
        const geometries = ['box', 'sphere', 'octahedron', 'torusKnot'];
        const randomShape = geometries[Math.floor(Math.random() * geometries.length)];
        orb.setAttribute('geometry', 'primitive', randomShape);
      });
    </script>
  </body>
</html>
