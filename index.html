<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hand Tracking Web Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --primary: #6200ee;
            --surface: #121212;
            --on-surface: #ffffff;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--surface);
            color: var(--on-surface);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Le Curseur Spécial */
        #cursor {
            position: fixed;
            width: 25px; height: 25px;
            background: rgba(0, 255, 0, 0.5);
            border: 2px solid #00ff00;
            border-radius: 50%;
            pointer-events: none; /* Ne bloque pas les clics en dessous */
            z-index: 10000;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px #00ff00;
        }
        #cursor.pinch {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(0.8);
            border-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        /* Interface Material */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 20px;
            text-align: center;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
            border: 1px solid #333;
        }
        .card.hover {
            transform: translateY(-5px);
            background: #2c2c2c;
            border-color: var(--primary);
        }
        
        #video_input { display: none; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div class="dashboard">
        <div class="card" id="btn-music">
            <h2>🎵</h2>
            <p>Musique</p>
        </div>
        <div class="card" id="btn-web">
            <h2>🌐</h2>
            <p>Navigateur</p>
        </div>
        <div class="card" id="btn-settings">
            <h2>⚙️</h2>
            <p>Réglages</p>
        </div>
        <div class="card" id="btn-off">
            <h2>🔒</h2>
            <p>Quitter</p>
        </div>
    </div>

    <video id="video_input" autoplay playsinline></video>

    <script>
        const cursorEl = document.getElementById('cursor');
        const cards = document.querySelectorAll('.card');
        let isMirror = true;

        // Variables de lissage (Stabilisation)
        let curX = 0, curY = 0;
        let tgtX = 0, tgtY = 0;
        const lerp = 0.2; // 0.2 = fluide, 1.0 = instantané

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8]; // Index
                const thumb = results.multiHandLandmarks[0][4]; // Pouce

                // Conversion coordonnées IA -> Ecran
                let rawX = isMirror ? (1 - landmark.x) : landmark.x;
                tgtX = rawX * window.innerWidth;
                tgtY = landmark.y * window.innerHeight;

                // Lissage (Lerp)
                curX += (tgtX - curX) * lerp;
                curY += (tgtY - curY) * lerp;

                cursorEl.style.left = curX + 'px';
                cursorEl.style.top = curY + 'px';

                // Détection Pincement (Click)
                const dist = Math.hypot(landmark.x - thumb.x, landmark.y - thumb.y);
                const isPinching = dist < 0.05;

                if (isPinching) {
                    cursorEl.classList.add('pinch');
                    simulateClick(curX, curY);
                } else {
                    cursorEl.classList.remove('pinch');
                    checkHover(curX, curY);
                    canClick = true;
                }
            }
        });

        function checkHover(x, y) {
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    card.classList.add('hover');
                } else {
                    card.classList.remove('hover');
                }
            });
        }

        let canClick = true;
        function simulateClick(x, y) {
            if (!canClick) return;
            const target = document.elementFromPoint(x, y);
            if (target && target.closest('.card')) {
                const card = target.closest('.card');
                card.style.backgroundColor = "#6200ee";
                setTimeout(() => card.style.backgroundColor = "#1e1e1e", 200);
                console.log("Cliqué sur : " + card.id);
            }
            canClick = false; // Anti-rebond
        }

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({video: { facingMode: "environment" }});
            const settings = stream.getVideoTracks()[0].getSettings();
            isMirror = (settings.facingMode === 'user' || !settings.facingMode);
            
            const videoElement = document.getElementById('video_input');
            videoElement.srcObject = stream;
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
        }

        init();
    </script>
</body>
</html>
